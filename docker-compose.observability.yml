name: auroraflow-observability

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.116.1
    restart: unless-stopped
    command: ['--config=/etc/otelcol-contrib/config.yaml']
    ports:
      - '127.0.0.1:4317:4317'
      - '127.0.0.1:4318:4318'
      - '127.0.0.1:9464:9464'
      - '127.0.0.1:13133:13133'
    volumes:
      - ./observability/otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml:ro
    depends_on:
      jaeger:
        condition: service_started
      logstash:
        condition: service_healthy
    healthcheck:
      test: ['CMD', '/otelcol-contrib', 'components', '--config=/etc/otelcol-contrib/config.yaml']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  prometheus:
    image: prom/prometheus:v3.0.1
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.enable-lifecycle'
    ports:
      - '127.0.0.1:9090:9090'
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    depends_on:
      otel-collector:
        condition: service_started
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:9090/-/ready >/dev/null 2>&1 || exit 1']
      interval: 15s
      timeout: 5s
      retries: 10

  grafana:
    image: grafana/grafana:11.4.0
    restart: unless-stopped
    ports:
      - '127.0.0.1:3000:3000'
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: 'true'
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: 'true'
      GF_SECURITY_ADMIN_PASSWORD: auroraflow-local
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_started
      elasticsearch:
        condition: service_healthy
      jaeger:
        condition: service_started
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3000/api/health >/dev/null 2>&1 || exit 1']
      interval: 15s
      timeout: 5s
      retries: 10

  jaeger:
    image: jaegertracing/all-in-one:1.63.0
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: 'true'
    ports:
      - '127.0.0.1:16686:16686'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:16686/ >/dev/null 2>&1 || exit 1']
      interval: 15s
      timeout: 5s
      retries: 10

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: 'false'
      ES_JAVA_OPTS: '-Xms512m -Xmx512m'
    ports:
      - '127.0.0.1:9200:9200'
    volumes:
      - ./observability/elastic/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://127.0.0.1:9200/_cluster/health >/dev/null || exit 1']
      interval: 20s
      timeout: 10s
      retries: 12
      start_period: 30s

  logstash:
    image: docker.elastic.co/logstash/logstash:8.17.0
    restart: unless-stopped
    volumes:
      - ./observability/logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
      - ./observability/logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./logs:/auroraflow/logs:ro
      - ./test-results:/auroraflow/test-results:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://127.0.0.1:9600/_node/pipelines >/dev/null || exit 1']
      interval: 20s
      timeout: 10s
      retries: 12
      start_period: 30s

  kibana:
    image: docker.elastic.co/kibana/kibana:8.17.0
    restart: unless-stopped
    ports:
      - '127.0.0.1:5601:5601'
    volumes:
      - ./observability/kibana/kibana.yml:/usr/share/kibana/config/kibana.yml:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://127.0.0.1:5601/api/status >/dev/null || exit 1']
      interval: 20s
      timeout: 10s
      retries: 12
      start_period: 30s

volumes:
  prometheus-data:
  grafana-data:
  elasticsearch-data:
