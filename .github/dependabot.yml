version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '04:00'
      timezone: 'UTC'
    open-pull-requests-limit: 10
    ignore:
      - dependency-name: 'eslint'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: '@eslint/js'
        update-types:
          - 'version-update:semver-major'
      # typescript-eslint@8 peer-requires typescript <6.1.0, so a semver-major
      # typescript bump (e.g. 7.x) fails `npm ci` with ERESOLVE. Pin to the 6.x
      # line until the type-aware lint toolchain supports the next major.
      - dependency-name: 'typescript'
        update-types:
          - 'version-update:semver-major'
    groups:
      npm-production:
        applies-to: 'version-updates'
        dependency-type: 'production'
        update-types:
          - 'minor'
          - 'patch'
      npm-development:
        applies-to: 'version-updates'
        dependency-type: 'development'
        update-types:
          - 'minor'
          - 'patch'
      npm-security:
        applies-to: 'security-updates'
        patterns:
          - '*'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '04:15'
      timezone: 'UTC'
    open-pull-requests-limit: 5
    groups:
      github-actions:
        applies-to: 'version-updates'
        patterns:
          - '*'
      github-actions-security:
        applies-to: 'security-updates'
        patterns:
          - '*'
