version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '04:00'
      timezone: 'UTC'
    open-pull-requests-limit: 10
    ignore:
      - dependency-name: 'eslint'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: '@eslint/js'
        update-types:
          - 'version-update:semver-major'
    groups:
      npm-production:
        dependency-type: 'production'
        update-types:
          - 'minor'
          - 'patch'
      npm-development:
        dependency-type: 'development'
        update-types:
          - 'minor'
          - 'patch'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '04:15'
      timezone: 'UTC'
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - '*'
