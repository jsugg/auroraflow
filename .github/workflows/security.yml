name: Security Checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '0 4 * * 1'

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 4
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Compare dependency alerts against base
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/dependency-review.sh

  npm-audit:
    name: NPM Audit
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (high+)
        run: npm run security:audit

  codeql:
    name: CodeQL
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 12
    permissions:
      security-events: write
      contents: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript']
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2

  secret-scan:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Run gitleaks scan
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: 'false'

  workflow-security:
    name: Workflow Security (zizmor)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Analyze workflows with zizmor
        run: npm run security:workflows

  secret-scan-effect-proof:
    name: Secret Scan Effect Proof
    runs-on: ubuntu-latest
    timeout-minutes: 6
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Commit synthetic secret fixture
        run: |
          mkdir -p .tmp/security-secret-proof
          {
            printf 'aws_access_key_id = AKIA%s\n' 'IOSFODNN7EXAMPLE'
            printf 'aws_secret_access_key = %s%s\n' 'wJalrXUtnFEMI/K7MDENG+bPxRfiCY' 'EXAMPLEKEY'
          } > .tmp/security-secret-proof/credentials
          git config user.email "security-proof@example.invalid"
          git config user.name "Security Proof"
          git add -f .tmp/security-secret-proof/credentials
          git commit -m "synthetic secret scan proof"

      - name: Run gitleaks against synthetic secret
        id: synthetic-gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: 'false'
          GITLEAKS_ENABLE_SUMMARY: 'false'
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: 'false'

      - name: Assert synthetic secret was detected
        env:
          SYNTHETIC_GITLEAKS_OUTCOME: ${{ steps.synthetic-gitleaks.outcome }}
        run: |
          if [ "$SYNTHETIC_GITLEAKS_OUTCOME" != "failure" ]; then
            echo "Synthetic gitleaks proof did not fail on planted secret; scanner may be disabled or misconfigured."
            exit 1
          fi
          echo "Synthetic gitleaks proof failed on planted secret as expected."

  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    if: always()
    needs:
      - dependency-review
      - npm-audit
      - codeql
      - secret-scan
      - secret-scan-effect-proof
      - workflow-security
    permissions:
      contents: read
    timeout-minutes: 3
    steps:
      - name: Enforce upstream security job results
        env:
          DEPENDENCY_REVIEW_RESULT: ${{ needs.dependency-review.result }}
          NPM_AUDIT_RESULT: ${{ needs.npm-audit.result }}
          CODEQL_RESULT: ${{ needs.codeql.result }}
          SECRET_SCAN_RESULT: ${{ needs.secret-scan.result }}
          SECRET_SCAN_EFFECT_PROOF_RESULT: ${{ needs.secret-scan-effect-proof.result }}
          WORKFLOW_SECURITY_RESULT: ${{ needs.workflow-security.result }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "$DEPENDENCY_REVIEW_RESULT" != "success" ]; then
            echo "Dependency review failed: $DEPENDENCY_REVIEW_RESULT"
            exit 1
          fi
          if [ "${{ github.event_name }}" != "pull_request" ] && [ "$NPM_AUDIT_RESULT" != "success" ]; then
            echo "NPM audit failed: $NPM_AUDIT_RESULT"
            exit 1
          fi
          if [ "$SECRET_SCAN_RESULT" != "success" ]; then
            echo "Secret scan failed: $SECRET_SCAN_RESULT"
            exit 1
          fi
          if [ "$SECRET_SCAN_EFFECT_PROOF_RESULT" != "success" ]; then
            echo "Secret scan effect proof failed: $SECRET_SCAN_EFFECT_PROOF_RESULT"
            exit 1
          fi
          if [ "$WORKFLOW_SECURITY_RESULT" != "success" ]; then
            echo "Workflow security failed: $WORKFLOW_SECURITY_RESULT"
            exit 1
          fi
          if [ "${{ github.event_name }}" != "pull_request" ] && [ "$CODEQL_RESULT" != "success" ]; then
            echo "CodeQL failed: $CODEQL_RESULT"
            exit 1
          fi
