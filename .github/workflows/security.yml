name: Security Checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '0 4 * * 1'

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Dependency review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: high

  npm-audit:
    name: NPM Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (high+)
        run: npm run security:check

  codeql:
    name: CodeQL
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 12
    permissions:
      security-events: write
      contents: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript']
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@5c8a8a642e79153f5d047b10ec1cba1d1cc65699 # v3
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@5c8a8a642e79153f5d047b10ec1cba1d1cc65699 # v3

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@5c8a8a642e79153f5d047b10ec1cba1d1cc65699 # v3

  workflow-security:
    name: Workflow Security (zizmor)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Install zizmor
        run: python -m pip install --upgrade pip zizmor

      - name: Analyze workflows with zizmor
        run: zizmor .github/workflows

  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    if: always()
    needs:
      - dependency-review
      - npm-audit
      - codeql
      - workflow-security
    permissions:
      contents: read
    timeout-minutes: 3
    steps:
      - name: Enforce upstream security job results
        env:
          DEPENDENCY_REVIEW_RESULT: ${{ needs.dependency-review.result }}
          NPM_AUDIT_RESULT: ${{ needs.npm-audit.result }}
          CODEQL_RESULT: ${{ needs.codeql.result }}
          WORKFLOW_SECURITY_RESULT: ${{ needs.workflow-security.result }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "$DEPENDENCY_REVIEW_RESULT" != "success" ]; then
            echo "Dependency review failed: $DEPENDENCY_REVIEW_RESULT"
            exit 1
          fi
          if [ "$NPM_AUDIT_RESULT" != "success" ]; then
            echo "NPM audit failed: $NPM_AUDIT_RESULT"
            exit 1
          fi
          if [ "$WORKFLOW_SECURITY_RESULT" != "success" ]; then
            echo "Workflow security failed: $WORKFLOW_SECURITY_RESULT"
            exit 1
          fi
          if [ "${{ github.event_name }}" != "pull_request" ] && [ "$CODEQL_RESULT" != "success" ]; then
            echo "CodeQL failed: $CODEQL_RESULT"
            exit 1
          fi
