name: Security Checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '0 4 * * 1'

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 4
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Compare dependency alerts against base
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/dependency-review.sh

  npm-audit:
    name: NPM Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (high+)
        run: npm run security:check

  codeql:
    name: CodeQL
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 12
    permissions:
      security-events: write
      contents: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript']
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1

  workflow-security:
    name: Workflow Security (zizmor)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install zizmor
        run: python -m pip install --upgrade pip zizmor

      - name: Analyze workflows with zizmor
        run: zizmor .github/workflows

  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    if: always()
    needs:
      - dependency-review
      - npm-audit
      - codeql
      - workflow-security
    permissions:
      contents: read
    timeout-minutes: 3
    steps:
      - name: Enforce upstream security job results
        env:
          DEPENDENCY_REVIEW_RESULT: ${{ needs.dependency-review.result }}
          NPM_AUDIT_RESULT: ${{ needs.npm-audit.result }}
          CODEQL_RESULT: ${{ needs.codeql.result }}
          WORKFLOW_SECURITY_RESULT: ${{ needs.workflow-security.result }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "$DEPENDENCY_REVIEW_RESULT" != "success" ]; then
            echo "Dependency review failed: $DEPENDENCY_REVIEW_RESULT"
            exit 1
          fi
          if [ "$NPM_AUDIT_RESULT" != "success" ]; then
            echo "NPM audit failed: $NPM_AUDIT_RESULT"
            exit 1
          fi
          if [ "$WORKFLOW_SECURITY_RESULT" != "success" ]; then
            echo "Workflow security failed: $WORKFLOW_SECURITY_RESULT"
            exit 1
          fi
          if [ "${{ github.event_name }}" != "pull_request" ] && [ "$CODEQL_RESULT" != "success" ]; then
            echo "CodeQL failed: $CODEQL_RESULT"
            exit 1
          fi
