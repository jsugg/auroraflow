name: Security Checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '0 4 * * 1'

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  preflight:
    name: Security Preflight
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      run_effect_proof: ${{ steps.paths-filter.outputs.effect_proof }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Detect security-governing changes
        id: paths-filter
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          # The gitleaks version/checksum, synthetic credential, allowlist, and
          # scanner invocation all live inline in security.yml, so its change is
          # what governs whether the effect-proof meta-test must re-run on a PR.
          filters: |
            effect_proof:
              - '.github/workflows/security.yml'
              - '.github/zizmor.yml'
              - 'scripts/dependency-review.sh'

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 4
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Compare dependency alerts against base
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/dependency-review.sh

  npm-audit:
    name: NPM Audit
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup locked Node.js dependencies
        uses: ./.github/actions/setup-node-cache
        with:
          node-version: '22'
          cache-namespace: security-audit
          cache-version: v1

      - name: Run npm audit (high+)
        run: npm run security:audit

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    timeout-minutes: 12
    permissions:
      security-events: write
      contents: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript']
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          languages: ${{ matrix.language }}

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1

  secret-scan:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Run gitleaks scan
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: 'false'

  workflow-security:
    name: Workflow Security (zizmor)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Activate repo npm version
        run: |
          npm_version=$(node -p "require('./package.json').packageManager.replace(/^npm@/, '')")
          corepack enable
          corepack prepare "npm@${npm_version}" --activate
          npm --version

      - name: Analyze workflows with zizmor
        run: npm run security:workflows

  secret-scan-effect-proof:
    name: Secret Scan Effect Proof
    runs-on: ubuntu-latest
    needs: preflight
    # Scanner-effectiveness meta-test. It runs on push/schedule/dispatch and on
    # pull requests only when the scanner configuration itself changed, so it no
    # longer consumes a runner on every ordinary PR (spec section 8).
    if: github.event_name != 'pull_request' || needs.preflight.outputs.run_effect_proof == 'true'
    timeout-minutes: 6
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Install pinned gitleaks
        run: |
          set -euo pipefail
          version=8.30.1
          sha256=551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${version}/gitleaks_${version}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
          printf '%s  /tmp/gitleaks.tar.gz\n' "${sha256}" | sha256sum -c -
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          /tmp/gitleaks version

      - name: Assert the secret scanner detects a planted credential
        run: |
          set -uo pipefail
          mkdir -p .tmp/security-secret-proof
          # Synthetic, non-allowlisted fake token; never a real credential. The AWS
          # documentation example key is allowlisted by gitleaks, so it cannot prove
          # detection; a filesystem scan also avoids gitleaks-action's PR-range limit.
          printf 'github_pat = ghp_%s\n' 'A1b2C3d4E5f6G7h8I9j0K1l2M3n4O5p6Q7r8' \
            > .tmp/security-secret-proof/credentials
          code=0
          /tmp/gitleaks detect --no-git --source .tmp/security-secret-proof --redact -v || code=$?
          rm -rf .tmp/security-secret-proof
          if [ "$code" -eq 0 ]; then
            echo "Secret scanner did not flag the planted credential; the gate may be ineffective."
            exit 1
          fi
          echo "Secret scanner flagged the planted credential as expected (gitleaks exit ${code})."

  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    if: always()
    needs:
      - preflight
      - dependency-review
      - npm-audit
      - codeql
      - secret-scan
      - secret-scan-effect-proof
      - workflow-security
    permissions:
      contents: read
    timeout-minutes: 3
    steps:
      - name: Enforce upstream security job results
        env:
          DEPENDENCY_REVIEW_RESULT: ${{ needs.dependency-review.result }}
          NPM_AUDIT_RESULT: ${{ needs.npm-audit.result }}
          CODEQL_RESULT: ${{ needs.codeql.result }}
          SECRET_SCAN_RESULT: ${{ needs.secret-scan.result }}
          SECRET_SCAN_EFFECT_PROOF_RESULT: ${{ needs.secret-scan-effect-proof.result }}
          WORKFLOW_SECURITY_RESULT: ${{ needs.workflow-security.result }}
          RUN_EFFECT_PROOF: ${{ needs.preflight.outputs.run_effect_proof }}
        run: |
          set -u
          status=0

          require_success() {
            label="$1"
            result="$2"
            if [ "$result" != "success" ]; then
              echo "::error::${label} expected success but was ${result:-missing}"
              status=1
            fi
          }

          require_skipped() {
            label="$1"
            result="$2"
            if [ "$result" != "skipped" ]; then
              echo "::error::${label} expected skipped for ${{ github.event_name }} but was ${result:-missing}"
              status=1
            fi
          }

          {
            echo "### Security Gate results"
            echo
            echo "| Job | Expected | Actual |"
            echo "| --- | --- | --- |"
          } >> "$GITHUB_STEP_SUMMARY"

          record_result() {
            label="$1"
            expected="$2"
            result="$3"
            echo "| ${label} | ${expected} | ${result:-missing} |" >> "$GITHUB_STEP_SUMMARY"
          }

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            require_success "Dependency Review" "$DEPENDENCY_REVIEW_RESULT"
            require_skipped "NPM Audit" "$NPM_AUDIT_RESULT"
            record_result "Dependency Review" "success" "$DEPENDENCY_REVIEW_RESULT"
            record_result "NPM Audit" "skipped" "$NPM_AUDIT_RESULT"
          else
            require_skipped "Dependency Review" "$DEPENDENCY_REVIEW_RESULT"
            require_success "NPM Audit" "$NPM_AUDIT_RESULT"
            record_result "Dependency Review" "skipped" "$DEPENDENCY_REVIEW_RESULT"
            record_result "NPM Audit" "success" "$NPM_AUDIT_RESULT"
          fi

          require_success "CodeQL" "$CODEQL_RESULT"
          require_success "Secret Scan" "$SECRET_SCAN_RESULT"
          require_success "Workflow Security" "$WORKFLOW_SECURITY_RESULT"
          record_result "CodeQL" "success" "$CODEQL_RESULT"
          record_result "Secret Scan" "success" "$SECRET_SCAN_RESULT"
          record_result "Workflow Security" "success" "$WORKFLOW_SECURITY_RESULT"

          # Effect proof runs on push/schedule/dispatch, and on pull requests only
          # when scanner-governing files changed; otherwise it is intentionally
          # skipped and the gate must confirm that skip rather than a silent drop.
          if [ "${{ github.event_name }}" != "pull_request" ] || [ "$RUN_EFFECT_PROOF" = "true" ]; then
            require_success "Secret Scan Effect Proof" "$SECRET_SCAN_EFFECT_PROOF_RESULT"
            record_result "Secret Scan Effect Proof" "success" "$SECRET_SCAN_EFFECT_PROOF_RESULT"
          else
            require_skipped "Secret Scan Effect Proof" "$SECRET_SCAN_EFFECT_PROOF_RESULT"
            record_result "Secret Scan Effect Proof" "skipped" "$SECRET_SCAN_EFFECT_PROOF_RESULT"
          fi

          if [ "$status" -ne 0 ]; then
            echo "Security Gate failed closed because one or more required security jobs had an unexpected result."
            exit "$status"
          fi

          echo "Security Gate passed with the expected event-aware result map."
