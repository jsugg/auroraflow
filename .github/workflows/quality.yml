name: Quality Gates

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      run_smoke: ${{ steps.paths-filter.outputs.smoke }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Detect smoke-relevant changes
        id: paths-filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            smoke:
              - 'src/**'
              - 'tests/suites/e2e/**'
              - 'configs/playwright.config.ts'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/quality.yml'

  verify:
    name: Verify (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 5
    needs: preflight
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        node-version: [20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install --yes shellcheck

      - name: Run quality gates
        run: npm run verify

  smoke-e2e:
    name: Smoke E2E (Chrome)
    runs-on: ubuntu-latest
    needs: [preflight, verify]
    timeout-minutes: 8
    permissions:
      contents: read
    env:
      SHOULD_RUN_SMOKE: ${{ github.ref == 'refs/heads/main' || needs.preflight.outputs.run_smoke == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: env.SHOULD_RUN_SMOKE == 'true'
        run: npm ci

      - name: Cache Playwright browsers
        if: env.SHOULD_RUN_SMOKE == 'true'
        id: playwright-cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chrome-${{ hashFiles('package-lock.json') }}

      - name: Ensure Playwright browser (Chrome) is installed
        if: env.SHOULD_RUN_SMOKE == 'true'
        run: npx playwright install chrome

      - name: Run smoke test
        if: env.SHOULD_RUN_SMOKE == 'true'
        run: npm run test:smoke

      - name: Upload smoke artifacts
        if: env.SHOULD_RUN_SMOKE == 'true' && always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: smoke-e2e-artifacts
          retention-days: 7
          path: |
            test-results/
            test-reports/

      - name: Skip smoke lane when no relevant changes
        if: env.SHOULD_RUN_SMOKE != 'true'
        run: echo "No smoke-relevant changes detected; smoke lane completed as no-op."
