name: Quality Gates

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      run_lockfile_check: ${{ steps.paths-filter.outputs.lockfile_check }}
      run_observability_stack: ${{ steps.paths-filter.outputs.observability_stack }}
      run_risk_e2e: ${{ steps.paths-filter.outputs.risk_e2e }}
      run_smoke: ${{ steps.paths-filter.outputs.smoke }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Detect smoke-relevant changes
        id: paths-filter
        if: github.event_name == 'pull_request' || github.event_name == 'push'
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          filters: |
            lockfile_check:
              - 'package.json'
              - 'package-lock.json'
              - '.github/dependabot.yml'
              - '.github/actions/setup-node-cache/action.yml'
              - 'scripts/check-lockfile-drift.mjs'
              - '.github/workflows/quality.yml'
            smoke:
              - 'src/**'
              - 'tests/suites/e2e/**'
              - 'tests/fixtures/e2e-app/**'
              - 'configs/playwright.config.ts'
              - 'scripts/e2e-fixture-server.mjs'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/quality.yml'
            risk_e2e:
              - 'src/pageObjects/**'
              - 'src/framework/selfHealing/**'
              - 'tests/suites/e2e/**'
              - 'tests/fixtures/e2e-app/**'
              - 'configs/playwright.config.ts'
              - 'scripts/e2e-fixture-server.mjs'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/quality.yml'
            observability_stack:
              - '.github/workflows/quality.yml'
              - 'docker-compose.observability*.yml'
              - 'docs/adr/0007-durable-trend-export.md'
              - 'docs/architecture/observability-stack.md'
              - 'docs/operations/observability-contract.md'
              - 'docs/operations/observability-support-tiers.md'
              - 'docs/operations/trend-durable-export.md'
              - 'observability/**'
              - 'scripts/observability-*.ts'
              - 'src/framework/observability/**'
              - 'tests/suites/unit/framework/observability/**'
              - 'package.json'
              - 'package-lock.json'
              - 'scripts/observability-ci-smoke.ts'
              - 'scripts/observability-collector-receipt.ts'
              - 'src/framework/observability/**'
              - 'tests/suites/contracts/observability/**'

      - name: Skip path filtering for scheduled or manual runs
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: echo "Scheduled/manual run executes repository and heavy observability gates directly."

  lockfile-drift:
    name: Lockfile Drift
    runs-on: ubuntu-latest
    needs: preflight
    if: github.ref == 'refs/heads/main' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || needs.preflight.outputs.run_lockfile_check == 'true' || startsWith(github.head_ref, 'dependabot/')
    timeout-minutes: 3
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js for lockfile check
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Check package lockfile drift
        run: npm run lockfile:check

  verify:
    name: Node Compatibility (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 5
    needs: preflight
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        node-version: [20, 22, 24]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup locked Node.js dependencies
        uses: ./.github/actions/setup-node-cache
        with:
          node-version: ${{ matrix.node-version }}
          cache-namespace: node-${{ matrix.node-version }}
          cache-version: v1

      - name: Run Node compatibility static gates
        run: npm run lint && npm run typecheck

      - name: Run unit tests
        run: npm test

  repository-gates:
    name: Repository Gates (Node 22)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 8
    needs: preflight
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup locked Node.js dependencies
        uses: ./.github/actions/setup-node-cache
        with:
          node-version: '22'
          cache-namespace: repository-gates
          cache-version: v1

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install --yes shellcheck

      - name: Install actionlint
        run: npm run tools:actionlint

      - name: Run format check
        run: npm run format:check

      - name: Run contract tests
        run: npm run test:contracts

      - name: Run Redis/OTLP integration tests
        env:
          AURORAFLOW_REDIS_INTEGRATION_REQUIRED: 'true'
        run: npm run test:integration

      - name: Validate artifact schemas
        run: npm run schemas:check

      - name: Run shell and workflow lint
        run: npm run shellcheck && npm run workflows:lint

  coverage:
    name: Coverage (Critical + Global)
    runs-on: ubuntu-latest
    needs: preflight
    timeout-minutes: 8
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup locked Node.js dependencies
        uses: ./.github/actions/setup-node-cache
        with:
          node-version: '22'
          cache-namespace: coverage
          cache-version: v1

      - name: Enforce critical and global coverage thresholds
        run: |
          set -o pipefail
          mkdir -p coverage
          npm run test:coverage 2>&1 | tee coverage/coverage-gate.log

      - name: Summarize coverage gate
        if: always()
        run: |
          {
            echo "### Coverage gate"
            echo
            echo "Command: \`npm run test:coverage\`"
            echo
            echo "Critical-module and global coverage thresholds are enforced by this required job."
            echo
            echo "\`\`\`text"
            if [ -f coverage/coverage-gate.log ]; then
              tail -n 120 coverage/coverage-gate.log
            else
              echo "coverage/coverage-gate.log was not created."
            fi
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"

  mutation-baseline:
    name: Mutation Baseline (Advisory)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup locked Node.js dependencies
        uses: ./.github/actions/setup-node-cache
        with:
          node-version: '22'
          cache-namespace: mutation-baseline
          cache-version: v1

      - name: Check mutation baseline
        run: |
          set -o pipefail
          mkdir -p mutation-output
          npm run test:mutation:check 2>&1 | tee mutation-output/baseline-check.txt

      - name: Upload mutation baseline evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mutation-baseline-${{ github.run_id }}
          retention-days: 14
          path: mutation-output/baseline-check.txt

  guarded-self-heal:
    name: Guarded Self-Heal Proof (Chrome)
    runs-on: ubuntu-latest
    needs: [preflight, verify, repository-gates]
    timeout-minutes: 8
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup locked Node.js dependencies and Playwright browser
        uses: ./.github/actions/setup-node-cache
        with:
          node-version: '22'
          install-browsers: 'true'
          browser-name: chrome
          cache-namespace: guarded-chrome
          cache-version: v1

      - name: Prove guarded self-heal at default gate
        run: npm run test:e2e:guarded

      - name: Upload guarded self-heal artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: guarded-self-heal-proof
          retention-days: 7
          path: |
            test-results/
            test-reports/

  risk-e2e:
    name: Risk-Triggered E2E (Chrome)
    runs-on: ubuntu-latest
    needs: [preflight, verify, repository-gates]
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      SHOULD_RUN_RISK_E2E: ${{ github.ref == 'refs/heads/main' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || needs.preflight.outputs.run_risk_e2e == 'true' || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'full-e2e')) || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'risk:e2e')) }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup locked Node.js dependencies and Playwright browser
        if: env.SHOULD_RUN_RISK_E2E == 'true'
        uses: ./.github/actions/setup-node-cache
        with:
          node-version: '22'
          install-browsers: 'true'
          browser-name: chrome
          cache-namespace: risk-chrome
          cache-version: v1

      - name: Run full Chrome E2E suite
        if: env.SHOULD_RUN_RISK_E2E == 'true'
        run: npm run test:e2e -- --project='Google Chrome'

      - name: Upload risk E2E artifacts
        if: env.SHOULD_RUN_RISK_E2E == 'true' && always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: risk-e2e-artifacts
          retention-days: 7
          path: |
            test-results/
            test-reports/

      - name: Skip risk-triggered E2E when not requested
        if: env.SHOULD_RUN_RISK_E2E != 'true'
        run: echo "No risky browser/runtime changes or full-e2e label detected; risk E2E completed as no-op."

  observability-stack:
    name: Observability Lite Smoke
    runs-on: ubuntu-latest
    needs: [preflight, verify, repository-gates]
    timeout-minutes: 8
    permissions:
      contents: read
    env:
      SHOULD_RUN_OBSERVABILITY: ${{ github.ref == 'refs/heads/main' || (needs.preflight.outputs.run_observability_stack == 'true' && vars.AURORAFLOW_OBSERVABILITY_CI_ENABLED != 'false') }}
      OBSERVABILITY_DIAGNOSTICS_DIR: observability-output/ci
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup locked Node.js dependencies
        if: env.SHOULD_RUN_OBSERVABILITY == 'true'
        uses: ./.github/actions/setup-node-cache
        with:
          node-version: '22'
          cache-namespace: observability-lite
          cache-version: v1

      - name: Validate Lite collector-only Compose config
        if: env.SHOULD_RUN_OBSERVABILITY == 'true'
        run: docker compose -f docker-compose.observability-ci.yml config

      - name: Start Lite collector-only stack
        if: env.SHOULD_RUN_OBSERVABILITY == 'true'
        run: docker compose -f docker-compose.observability-ci.yml up -d

      - name: Wait for collector health
        if: env.SHOULD_RUN_OBSERVABILITY == 'true'
        run: |
          for attempt in $(seq 1 30); do
            if curl --fail --silent --show-error http://localhost:13133/ >/dev/null; then
              exit 0
            fi
            echo "Waiting for collector health (${attempt}/30)"
            sleep 2
          done
          docker compose -f docker-compose.observability-ci.yml logs otel-collector
          exit 1

      - name: Emit smoke telemetry
        if: env.SHOULD_RUN_OBSERVABILITY == 'true'
        env:
          AURORAFLOW_OBSERVABILITY_DIAGNOSTICS_DIR: ${{ env.OBSERVABILITY_DIAGNOSTICS_DIR }}
          AURORAFLOW_OBSERVABILITY_EMIT_OTLP_LOG: 'true'
          AURORAFLOW_OBSERVABILITY_ENABLED: 'true'
          AURORAFLOW_OBSERVABILITY_ENVIRONMENT: ci
          AURORAFLOW_OBSERVABILITY_STRICT: 'true'
          OTEL_EXPORTER_OTLP_ENDPOINT: http://localhost:4318
        run: npm run observability:ci:smoke

      - name: Assert Lite collector receipt
        if: env.SHOULD_RUN_OBSERVABILITY == 'true'
        run: |
          mkdir -p "${OBSERVABILITY_DIAGNOSTICS_DIR}"
          for attempt in $(seq 1 15); do
            curl --fail --silent --show-error http://localhost:9464/metrics > "${OBSERVABILITY_DIAGNOSTICS_DIR}/collector-metrics.txt" || true
            docker compose -f docker-compose.observability-ci.yml logs --no-color otel-collector > "${OBSERVABILITY_DIAGNOSTICS_DIR}/collector.log" || true
            if npm run observability:collector-receipt -- \
              --metrics-path "${OBSERVABILITY_DIAGNOSTICS_DIR}/collector-metrics.txt" \
              --collector-log-path "${OBSERVABILITY_DIAGNOSTICS_DIR}/collector.log" \
              --output-dir "${OBSERVABILITY_DIAGNOSTICS_DIR}"; then
              exit 0
            fi
            echo "Waiting for Collector receipt evidence (${attempt}/15)"
            sleep 2
          done
          echo "Collector receipt evidence did not become complete."
          exit 1

      - name: Capture observability diagnostics
        if: env.SHOULD_RUN_OBSERVABILITY == 'true' && always()
        run: |
          mkdir -p "${OBSERVABILITY_DIAGNOSTICS_DIR}"
          curl --silent --show-error http://localhost:13133/ > "${OBSERVABILITY_DIAGNOSTICS_DIR}/collector-health.txt" || true
          curl --silent --show-error http://localhost:9464/metrics > "${OBSERVABILITY_DIAGNOSTICS_DIR}/collector-metrics.txt" || true
          docker compose -f docker-compose.observability-ci.yml ps > "${OBSERVABILITY_DIAGNOSTICS_DIR}/compose-ps.txt" || true
          docker compose -f docker-compose.observability-ci.yml logs --no-color otel-collector > "${OBSERVABILITY_DIAGNOSTICS_DIR}/collector.log" || true

      - name: Stop Lite collector-only stack
        if: env.SHOULD_RUN_OBSERVABILITY == 'true' && always()
        run: docker compose -f docker-compose.observability-ci.yml down --remove-orphans

      - name: Upload observability diagnostics
        if: env.SHOULD_RUN_OBSERVABILITY == 'true' && always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: observability-collector-diagnostics
          retention-days: 7
          path: |
            observability-output/ci/
            logs/auroraflow.ndjson

      - name: Skip observability collector smoke when not requested
        if: env.SHOULD_RUN_OBSERVABILITY != 'true'
        run: echo "No observability-relevant changes detected; Lite collector smoke completed as no-op."

  observability-full-stack:
    name: Observability Full Stack Smoke
    runs-on: ubuntu-latest
    needs: [preflight, verify, repository-gates]
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      AURORAFLOW_OBSERVABILITY_FULL_STACK_CI_ENABLED: 'true'
      SHOULD_RUN_OBSERVABILITY_FULL_STACK: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
      OBSERVABILITY_DIAGNOSTICS_DIR: observability-output/full-stack
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup locked Node.js dependencies
        if: env.SHOULD_RUN_OBSERVABILITY_FULL_STACK == 'true'
        uses: ./.github/actions/setup-node-cache
        with:
          node-version: '22'
          cache-namespace: observability-full-stack
          cache-version: v1

      - name: Validate full-stack Compose config
        if: env.SHOULD_RUN_OBSERVABILITY_FULL_STACK == 'true'
        run: docker compose -f docker-compose.yml -f docker-compose.observability.yml config

      - name: Start full observability stack
        if: env.SHOULD_RUN_OBSERVABILITY_FULL_STACK == 'true'
        run: |
          mkdir -p logs test-results/self-healing "${OBSERVABILITY_DIAGNOSTICS_DIR}"
          printf '{"timestamp":"%s","level":"info","message":"Observability full-stack smoke log seed.","component":"observability-ci","runId":"%s","workflow":"%s","branch":"%s","commit":"%s"}\n' \
            "$(date --utc +%Y-%m-%dT%H:%M:%SZ)" \
            "${GITHUB_RUN_ID}" \
            "${GITHUB_WORKFLOW}" \
            "${GITHUB_REF_NAME}" \
            "${GITHUB_SHA}" > logs/auroraflow.ndjson
          docker compose -f docker-compose.yml -f docker-compose.observability.yml up -d

      - name: Wait for full-stack backends
        if: env.SHOULD_RUN_OBSERVABILITY_FULL_STACK == 'true'
        run: |
          npm run observability:validate -- \
            --mode readiness \
            --output-dir "${OBSERVABILITY_DIAGNOSTICS_DIR}" \
            --max-attempts 60 \
            --poll-interval-ms 3000 \
            --timeout-ms 15000

      - name: Provision Elasticsearch and Kibana assets
        if: env.SHOULD_RUN_OBSERVABILITY_FULL_STACK == 'true'
        run: |
          curl --fail --silent --show-error -X PUT http://localhost:9200/_ilm/policy/auroraflow-local-retention \
            -H 'Content-Type: application/json' \
            --data-binary @observability/elastic/ilm/auroraflow-local-retention.json

          for template in observability/elastic/index-templates/*.json; do
            name="$(basename "${template}" .json)"
            curl --fail --silent --show-error -X PUT "http://localhost:9200/_index_template/${name}" \
              -H 'Content-Type: application/json' \
              --data-binary "@${template}"
          done

          curl --fail --silent --show-error -X POST http://localhost:5601/api/saved_objects/_import?overwrite=true \
            -H 'kbn-xsrf: auroraflow' \
            --form file=@observability/kibana/saved-objects/auroraflow-log-exploration.ndjson

      - name: Emit full-stack smoke telemetry
        if: env.SHOULD_RUN_OBSERVABILITY_FULL_STACK == 'true'
        env:
          AURORAFLOW_OBSERVABILITY_DIAGNOSTICS_DIR: ${{ env.OBSERVABILITY_DIAGNOSTICS_DIR }}
          AURORAFLOW_OBSERVABILITY_ENABLED: 'true'
          AURORAFLOW_OBSERVABILITY_ENVIRONMENT: ci
          OTEL_EXPORTER_OTLP_ENDPOINT: http://localhost:4318
        run: npm run observability:ci:smoke

      - name: Emit full-stack smoke log through Logstash
        if: env.SHOULD_RUN_OBSERVABILITY_FULL_STACK == 'true'
        run: |
          curl --fail --silent --show-error -X POST http://localhost:8080 \
            -H 'Content-Type: application/json' \
            --data-binary @- <<EOF
          {
            "timestamp": "$(date --utc +%Y-%m-%dT%H:%M:%SZ)",
            "level": "info",
            "message": "Observability full-stack smoke log indexed through Logstash.",
            "component": "observability-ci",
            "runId": "${GITHUB_RUN_ID}",
            "workflow": "${GITHUB_WORKFLOW}",
            "branch": "${GITHUB_REF_NAME}",
            "commit": "${GITHUB_SHA}"
          }
          EOF

      - name: Validate full-stack backend APIs
        if: env.SHOULD_RUN_OBSERVABILITY_FULL_STACK == 'true'
        run: |
          npm run observability:validate -- \
            --mode smoke \
            --output-dir "${OBSERVABILITY_DIAGNOSTICS_DIR}" \
            --max-attempts 30 \
            --poll-interval-ms 2000 \
            --timeout-ms 10000

      - name: Validate Prometheus labels and rules
        if: env.SHOULD_RUN_OBSERVABILITY_FULL_STACK == 'true'
        run: npm run observability:live-assert -- --output-dir "${OBSERVABILITY_DIAGNOSTICS_DIR}"

      - name: Capture backend snapshots
        if: env.SHOULD_RUN_OBSERVABILITY_FULL_STACK == 'true' && always()
        run: npm run observability:snapshot -- --output-dir "${OBSERVABILITY_DIAGNOSTICS_DIR}" --allow-partial

      - name: Capture full-stack service logs
        if: env.SHOULD_RUN_OBSERVABILITY_FULL_STACK == 'true' && always()
        run: |
          mkdir -p "${OBSERVABILITY_DIAGNOSTICS_DIR}"
          docker compose -f docker-compose.yml -f docker-compose.observability.yml ps > "${OBSERVABILITY_DIAGNOSTICS_DIR}/compose-ps.txt" || true
          docker compose -f docker-compose.yml -f docker-compose.observability.yml logs --no-color > "${OBSERVABILITY_DIAGNOSTICS_DIR}/compose.log" || true

      - name: Stop full observability stack
        if: env.SHOULD_RUN_OBSERVABILITY_FULL_STACK == 'true' && always()
        run: docker compose -f docker-compose.yml -f docker-compose.observability.yml down --remove-orphans --volumes

      - name: Upload full-stack diagnostics
        if: env.SHOULD_RUN_OBSERVABILITY_FULL_STACK == 'true' && always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: observability-full-stack-diagnostics
          retention-days: 7
          path: |
            observability-output/full-stack/
            logs/auroraflow.ndjson

      - name: Skip full-stack smoke when not requested
        if: env.SHOULD_RUN_OBSERVABILITY_FULL_STACK != 'true'
        run: echo "No observability-relevant changes detected; full-stack smoke completed as no-op."

  observability-remote-export:
    name: Observability Remote Export Smoke
    runs-on: ubuntu-latest
    needs: [preflight, verify, repository-gates]
    timeout-minutes: 8
    permissions:
      contents: read
    env:
      AURORAFLOW_OBSERVABILITY_REMOTE_EXPORT_ENABLED: 'true'
      SHOULD_RUN_REMOTE_EXPORT: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
      OBSERVABILITY_DIAGNOSTICS_DIR: observability-output/remote-export
      OTEL_EXPORTER_OTLP_ENDPOINT: ${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}
      OTEL_EXPORTER_OTLP_HEADERS: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup locked Node.js dependencies
        if: env.SHOULD_RUN_REMOTE_EXPORT == 'true' && env.OTEL_EXPORTER_OTLP_ENDPOINT != ''
        uses: ./.github/actions/setup-node-cache
        with:
          node-version: '22'
          cache-namespace: observability-remote-export
          cache-version: v1

      - name: Emit remote smoke telemetry
        if: env.SHOULD_RUN_REMOTE_EXPORT == 'true' && env.OTEL_EXPORTER_OTLP_ENDPOINT != ''
        env:
          AURORAFLOW_OBSERVABILITY_DIAGNOSTICS_DIR: ${{ env.OBSERVABILITY_DIAGNOSTICS_DIR }}
          AURORAFLOW_OBSERVABILITY_ENABLED: 'true'
          AURORAFLOW_OBSERVABILITY_ENVIRONMENT: ci
          AURORAFLOW_OBSERVABILITY_STRICT: 'true'
        run: npm run observability:ci:smoke

      - name: Upload remote export diagnostics
        if: env.SHOULD_RUN_REMOTE_EXPORT == 'true' && env.OTEL_EXPORTER_OTLP_ENDPOINT != '' && always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: observability-remote-export-diagnostics
          retention-days: 7
          path: |
            observability-output/remote-export/smoke-result.json
            logs/auroraflow.ndjson

      - name: Skip remote export when not configured
        if: env.SHOULD_RUN_REMOTE_EXPORT != 'true' || env.OTEL_EXPORTER_OTLP_ENDPOINT == ''
        run: echo "Remote observability export smoke skipped because no observability-relevant changes were detected or the OTLP endpoint secret is not configured."

  smoke-e2e:
    name: Smoke E2E (Chrome)
    runs-on: ubuntu-latest
    needs: [preflight, verify, repository-gates]
    timeout-minutes: 8
    outputs:
      self_heal_triage_required: ${{ steps.self-heal-governance.outputs.triage_required }}
      self_heal_acknowledged: ${{ steps.self-heal-governance.outputs.acknowledged }}
      self_heal_guarded_accepted_count: ${{ steps.self-heal-governance.outputs.guarded_accepted_count }}
      self_heal_summary_markdown_path: ${{ steps.self-heal-governance.outputs.summary_markdown_path }}
    permissions:
      contents: read
      issues: write
    env:
      SHOULD_RUN_SMOKE: ${{ github.ref == 'refs/heads/main' || needs.preflight.outputs.run_smoke == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup locked Node.js dependencies and Playwright browser
        if: env.SHOULD_RUN_SMOKE == 'true'
        uses: ./.github/actions/setup-node-cache
        with:
          node-version: '22'
          install-browsers: 'true'
          browser-name: chrome
          cache-namespace: smoke-chrome
          cache-version: v1

      - name: Run smoke test
        if: env.SHOULD_RUN_SMOKE == 'true'
        run: npm run test:smoke

      - name: Evaluate self-healing governance
        id: self-heal-governance
        if: env.SHOULD_RUN_SMOKE == 'true' && always()
        env:
          SELF_HEAL_ARTIFACTS_DIR: test-results/self-healing
          SELF_HEAL_REQUIRE_ACK_FOR_ACCEPTED: 'true'
          SELF_HEAL_ACKNOWLEDGED: ${{ vars.SELF_HEAL_ACKNOWLEDGED }}
          SELF_HEAL_GOVERNANCE_SUMMARY_JSON: test-results/self-healing-governance-summary.json
          SELF_HEAL_GOVERNANCE_SUMMARY_MD: test-results/self-healing-governance-summary.md
        run: npm run self-heal:governance

      - name: Auto-open self-healing triage issue
        if: env.SHOULD_RUN_SMOKE == 'true' && always() && github.ref == 'refs/heads/main' && vars.SELF_HEAL_AUTO_OPEN_TRIAGE_ISSUE == 'true' && steps.self-heal-governance.outputs.triage_required == 'true' && steps.self-heal-governance.outputs.acknowledged != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SUMMARY_MARKDOWN_PATH: ${{ steps.self-heal-governance.outputs.summary_markdown_path }}
        run: |
          if [ ! -f "${SUMMARY_MARKDOWN_PATH}" ]; then
            echo "Self-healing governance summary not found at ${SUMMARY_MARKDOWN_PATH}"
            exit 1
          fi

          {
            echo ""
            echo "## CI Context"
            echo "- Workflow Run: ${RUN_URL}"
            echo "- Commit: ${GITHUB_SHA}"
          } >> "${SUMMARY_MARKDOWN_PATH}"

          gh issue create \
            --repo "${REPO}" \
            --title "Self-healing guarded acceptance review (${GITHUB_SHA::7})" \
            --body-file "${SUMMARY_MARKDOWN_PATH}"

      - name: Upload smoke artifacts
        if: env.SHOULD_RUN_SMOKE == 'true' && always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: smoke-e2e-artifacts
          retention-days: 7
          path: |
            test-results/
            test-reports/

      - name: Skip smoke lane when no relevant changes
        if: env.SHOULD_RUN_SMOKE != 'true'
        run: echo "No smoke-relevant changes detected; smoke lane completed as no-op."
