name: Quality Gates

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      run_smoke: ${{ steps.paths-filter.outputs.smoke }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Detect smoke-relevant changes
        id: paths-filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            smoke:
              - 'src/**'
              - 'tests/suites/e2e/**'
              - 'configs/playwright.config.ts'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/quality.yml'

  verify:
    name: Verify (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 5
    needs: preflight
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        node-version: [20, 22, 24]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install --yes shellcheck

      - name: Install actionlint
        run: |
          ACTIONLINT_VERSION='1.7.11'
          curl --fail --location --silent --show-error \
            --output /tmp/actionlint.tgz \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          tar -xzf /tmp/actionlint.tgz -C /tmp actionlint
          sudo install -m 0755 /tmp/actionlint /usr/local/bin/actionlint
          actionlint -version

      - name: Run quality gates
        run: npm run verify

  smoke-e2e:
    name: Smoke E2E (Chrome)
    runs-on: ubuntu-latest
    needs: [preflight, verify]
    timeout-minutes: 8
    outputs:
      self_heal_triage_required: ${{ steps.self-heal-governance.outputs.triage_required }}
      self_heal_acknowledged: ${{ steps.self-heal-governance.outputs.acknowledged }}
      self_heal_guarded_accepted_count: ${{ steps.self-heal-governance.outputs.guarded_accepted_count }}
      self_heal_summary_markdown_path: ${{ steps.self-heal-governance.outputs.summary_markdown_path }}
    permissions:
      contents: read
      issues: write
    env:
      SHOULD_RUN_SMOKE: ${{ github.ref == 'refs/heads/main' || needs.preflight.outputs.run_smoke == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: env.SHOULD_RUN_SMOKE == 'true'
        run: npm ci

      - name: Cache Playwright browsers
        if: env.SHOULD_RUN_SMOKE == 'true'
        id: playwright-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chrome-${{ hashFiles('package-lock.json') }}

      - name: Ensure Playwright browser (Chrome) is installed
        if: env.SHOULD_RUN_SMOKE == 'true'
        run: npx playwright install chrome

      - name: Run smoke test
        if: env.SHOULD_RUN_SMOKE == 'true'
        run: npm run test:smoke

      - name: Evaluate self-healing governance
        id: self-heal-governance
        if: env.SHOULD_RUN_SMOKE == 'true' && always()
        env:
          SELF_HEAL_ARTIFACTS_DIR: test-results/self-healing
          SELF_HEAL_REQUIRE_ACK_FOR_ACCEPTED: 'true'
          SELF_HEAL_ACKNOWLEDGED: ${{ vars.SELF_HEAL_ACKNOWLEDGED }}
          SELF_HEAL_GOVERNANCE_SUMMARY_JSON: test-results/self-healing-governance-summary.json
          SELF_HEAL_GOVERNANCE_SUMMARY_MD: test-results/self-healing-governance-summary.md
        run: npm run self-heal:governance

      - name: Auto-open self-healing triage issue
        if: env.SHOULD_RUN_SMOKE == 'true' && always() && github.ref == 'refs/heads/main' && vars.SELF_HEAL_AUTO_OPEN_TRIAGE_ISSUE == 'true' && steps.self-heal-governance.outputs.triage_required == 'true' && steps.self-heal-governance.outputs.acknowledged != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SUMMARY_MARKDOWN_PATH: ${{ steps.self-heal-governance.outputs.summary_markdown_path }}
        run: |
          if [ ! -f "${SUMMARY_MARKDOWN_PATH}" ]; then
            echo "Self-healing governance summary not found at ${SUMMARY_MARKDOWN_PATH}"
            exit 1
          fi

          {
            echo ""
            echo "## CI Context"
            echo "- Workflow Run: ${RUN_URL}"
            echo "- Commit: ${GITHUB_SHA}"
          } >> "${SUMMARY_MARKDOWN_PATH}"

          gh issue create \
            --repo "${REPO}" \
            --title "Self-healing guarded acceptance review (${GITHUB_SHA::7})" \
            --body-file "${SUMMARY_MARKDOWN_PATH}"

      - name: Upload smoke artifacts
        if: env.SHOULD_RUN_SMOKE == 'true' && always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: smoke-e2e-artifacts
          retention-days: 7
          path: |
            test-results/
            test-reports/

      - name: Skip smoke lane when no relevant changes
        if: env.SHOULD_RUN_SMOKE != 'true'
        run: echo "No smoke-relevant changes detected; smoke lane completed as no-op."
