name: Quality Gates

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      run_observability_stack: ${{ steps.paths-filter.outputs.observability_stack }}
      run_smoke: ${{ steps.paths-filter.outputs.smoke }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Detect smoke-relevant changes
        id: paths-filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            smoke:
              - 'src/**'
              - 'tests/suites/e2e/**'
              - 'configs/playwright.config.ts'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/quality.yml'
            observability_stack:
              - '.github/workflows/quality.yml'
              - 'docker-compose.observability*.yml'
              - 'docs/architecture/observability-stack.md'
              - 'docs/operations/observability-contract.md'
              - 'observability/**'
              - 'package.json'
              - 'package-lock.json'
              - 'scripts/observability-ci-smoke.ts'
              - 'src/framework/observability/**'
              - 'tests/suites/contracts/observability/**'

  verify:
    name: Verify (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 5
    needs: preflight
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        node-version: [20, 22, 24]
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install --yes shellcheck

      - name: Install actionlint
        run: |
          ACTIONLINT_VERSION='1.7.11'
          curl --fail --location --silent --show-error \
            --output /tmp/actionlint.tgz \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          tar -xzf /tmp/actionlint.tgz -C /tmp actionlint
          sudo install -m 0755 /tmp/actionlint /usr/local/bin/actionlint
          actionlint -version

      - name: Run quality gates
        run: npm run verify

  observability-stack:
    name: Observability Collector Smoke
    runs-on: ubuntu-latest
    needs: [preflight, verify]
    timeout-minutes: 8
    permissions:
      contents: read
    env:
      SHOULD_RUN_OBSERVABILITY: ${{ github.ref == 'refs/heads/main' || (needs.preflight.outputs.run_observability_stack == 'true' && vars.AURORAFLOW_OBSERVABILITY_CI_ENABLED != 'false') }}
      OBSERVABILITY_DIAGNOSTICS_DIR: observability-output/ci
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Node.js
        if: env.SHOULD_RUN_OBSERVABILITY == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: env.SHOULD_RUN_OBSERVABILITY == 'true'
        run: npm ci

      - name: Validate collector-only Compose config
        if: env.SHOULD_RUN_OBSERVABILITY == 'true'
        run: docker compose -f docker-compose.observability-ci.yml config

      - name: Start collector-only stack
        if: env.SHOULD_RUN_OBSERVABILITY == 'true'
        run: docker compose -f docker-compose.observability-ci.yml up -d

      - name: Wait for collector health
        if: env.SHOULD_RUN_OBSERVABILITY == 'true'
        run: |
          for attempt in $(seq 1 30); do
            if curl --fail --silent --show-error http://localhost:13133/ >/dev/null; then
              exit 0
            fi
            echo "Waiting for collector health (${attempt}/30)"
            sleep 2
          done
          docker compose -f docker-compose.observability-ci.yml logs otel-collector
          exit 1

      - name: Emit smoke telemetry
        if: env.SHOULD_RUN_OBSERVABILITY == 'true'
        env:
          AURORAFLOW_OBSERVABILITY_DIAGNOSTICS_DIR: ${{ env.OBSERVABILITY_DIAGNOSTICS_DIR }}
          AURORAFLOW_OBSERVABILITY_ENABLED: 'true'
          AURORAFLOW_OBSERVABILITY_ENVIRONMENT: ci
          OTEL_EXPORTER_OTLP_ENDPOINT: http://localhost:4318
        run: npm run observability:ci:smoke

      - name: Capture observability diagnostics
        if: env.SHOULD_RUN_OBSERVABILITY == 'true' && always()
        run: |
          mkdir -p "${OBSERVABILITY_DIAGNOSTICS_DIR}"
          curl --silent --show-error http://localhost:13133/ > "${OBSERVABILITY_DIAGNOSTICS_DIR}/collector-health.txt" || true
          curl --silent --show-error http://localhost:9464/metrics > "${OBSERVABILITY_DIAGNOSTICS_DIR}/collector-metrics.txt" || true
          docker compose -f docker-compose.observability-ci.yml ps > "${OBSERVABILITY_DIAGNOSTICS_DIR}/compose-ps.txt" || true
          docker compose -f docker-compose.observability-ci.yml logs --no-color otel-collector > "${OBSERVABILITY_DIAGNOSTICS_DIR}/collector.log" || true

      - name: Stop collector-only stack
        if: env.SHOULD_RUN_OBSERVABILITY == 'true' && always()
        run: docker compose -f docker-compose.observability-ci.yml down --remove-orphans

      - name: Upload observability diagnostics
        if: env.SHOULD_RUN_OBSERVABILITY == 'true' && always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: observability-collector-diagnostics
          retention-days: 7
          path: |
            observability-output/ci/
            logs/auroraflow.ndjson

      - name: Skip observability collector smoke when not requested
        if: env.SHOULD_RUN_OBSERVABILITY != 'true'
        run: echo "No observability-relevant changes detected; collector smoke completed as no-op."

  observability-full-stack:
    name: Observability Full Stack Smoke
    runs-on: ubuntu-latest
    needs: [preflight, verify]
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      SHOULD_RUN_OBSERVABILITY_FULL_STACK: ${{ (github.ref == 'refs/heads/main' || needs.preflight.outputs.run_observability_stack == 'true') && vars.AURORAFLOW_OBSERVABILITY_FULL_STACK_CI_ENABLED == 'true' }}
      OBSERVABILITY_DIAGNOSTICS_DIR: observability-output/full-stack
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Node.js
        if: env.SHOULD_RUN_OBSERVABILITY_FULL_STACK == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: env.SHOULD_RUN_OBSERVABILITY_FULL_STACK == 'true'
        run: npm ci

      - name: Validate full-stack Compose config
        if: env.SHOULD_RUN_OBSERVABILITY_FULL_STACK == 'true'
        run: docker compose -f docker-compose.yml -f docker-compose.observability.yml config

      - name: Start full observability stack
        if: env.SHOULD_RUN_OBSERVABILITY_FULL_STACK == 'true'
        run: |
          mkdir -p logs test-results/self-healing "${OBSERVABILITY_DIAGNOSTICS_DIR}"
          docker compose -f docker-compose.yml -f docker-compose.observability.yml up -d

      - name: Wait for full-stack backends
        if: env.SHOULD_RUN_OBSERVABILITY_FULL_STACK == 'true'
        run: |
          wait_for_url() {
            service_name="$1"
            url="$2"
            for attempt in $(seq 1 60); do
              if curl --fail --silent --show-error "${url}" >/dev/null; then
                return 0
              fi
              echo "Waiting for ${service_name} (${attempt}/60)"
              sleep 3
            done
            docker compose -f docker-compose.yml -f docker-compose.observability.yml ps
            docker compose -f docker-compose.yml -f docker-compose.observability.yml logs --no-color "${service_name}" || true
            return 1
          }

          wait_for_url otel-collector http://localhost:13133/
          wait_for_url prometheus http://localhost:9090/-/ready
          wait_for_url grafana http://localhost:3000/api/health
          wait_for_url jaeger http://localhost:16686/
          wait_for_url elasticsearch http://localhost:9200/_cluster/health
          wait_for_url kibana http://localhost:5601/api/status

      - name: Provision Elasticsearch and Kibana assets
        if: env.SHOULD_RUN_OBSERVABILITY_FULL_STACK == 'true'
        run: |
          curl --fail --silent --show-error -X PUT http://localhost:9200/_ilm/policy/auroraflow-local-retention \
            -H 'Content-Type: application/json' \
            --data-binary @observability/elastic/ilm/auroraflow-local-retention.json

          for template in observability/elastic/index-templates/*.json; do
            name="$(basename "${template}" .json)"
            curl --fail --silent --show-error -X PUT "http://localhost:9200/_index_template/${name}" \
              -H 'Content-Type: application/json' \
              --data-binary "@${template}"
          done

          curl --fail --silent --show-error -X POST http://localhost:5601/api/saved_objects/_import?overwrite=true \
            -H 'kbn-xsrf: auroraflow' \
            --form file=@observability/kibana/saved-objects/auroraflow-log-exploration.ndjson

      - name: Emit full-stack smoke telemetry
        if: env.SHOULD_RUN_OBSERVABILITY_FULL_STACK == 'true'
        env:
          AURORAFLOW_OBSERVABILITY_DIAGNOSTICS_DIR: ${{ env.OBSERVABILITY_DIAGNOSTICS_DIR }}
          AURORAFLOW_OBSERVABILITY_ENABLED: 'true'
          AURORAFLOW_OBSERVABILITY_ENVIRONMENT: ci
          OTEL_EXPORTER_OTLP_ENDPOINT: http://localhost:4318
        run: npm run observability:ci:smoke

      - name: Capture and validate backend snapshots
        if: env.SHOULD_RUN_OBSERVABILITY_FULL_STACK == 'true'
        run: |
          mkdir -p "${OBSERVABILITY_DIAGNOSTICS_DIR}"

          curl --fail --silent --show-error http://localhost:9090/api/v1/targets > "${OBSERVABILITY_DIAGNOSTICS_DIR}/prometheus-targets.json"
          grep -q '"health":"up"' "${OBSERVABILITY_DIAGNOSTICS_DIR}/prometheus-targets.json"
          for attempt in $(seq 1 30); do
            curl --fail --silent --show-error 'http://localhost:9090/api/v1/query?query=auroraflow_test_runs_total' > "${OBSERVABILITY_DIAGNOSTICS_DIR}/prometheus-auroraflow-test-runs.json" || true
            if grep -q 'auroraflow_test_runs_total' "${OBSERVABILITY_DIAGNOSTICS_DIR}/prometheus-auroraflow-test-runs.json"; then
              break
            fi
            echo "Waiting for Prometheus metric scrape (${attempt}/30)"
            sleep 2
          done
          grep -q 'auroraflow_test_runs_total' "${OBSERVABILITY_DIAGNOSTICS_DIR}/prometheus-auroraflow-test-runs.json"

          curl --fail --silent --show-error http://localhost:3000/api/health > "${OBSERVABILITY_DIAGNOSTICS_DIR}/grafana-health.json"
          curl --fail --silent --show-error http://localhost:3000/api/datasources > "${OBSERVABILITY_DIAGNOSTICS_DIR}/grafana-datasources.json"
          grep -q '"type":"prometheus"' "${OBSERVABILITY_DIAGNOSTICS_DIR}/grafana-datasources.json"
          grep -q '"type":"elasticsearch"' "${OBSERVABILITY_DIAGNOSTICS_DIR}/grafana-datasources.json"
          grep -q '"type":"jaeger"' "${OBSERVABILITY_DIAGNOSTICS_DIR}/grafana-datasources.json"

          for attempt in $(seq 1 30); do
            curl --fail --silent --show-error 'http://localhost:16686/api/traces?service=auroraflow&limit=20' > "${OBSERVABILITY_DIAGNOSTICS_DIR}/jaeger-traces.json" || true
            if grep -q '"traceID"' "${OBSERVABILITY_DIAGNOSTICS_DIR}/jaeger-traces.json"; then
              break
            fi
            echo "Waiting for Jaeger trace export (${attempt}/30)"
            sleep 2
          done
          grep -q '"traceID"' "${OBSERVABILITY_DIAGNOSTICS_DIR}/jaeger-traces.json"

          for attempt in $(seq 1 30); do
            curl --silent --show-error 'http://localhost:9200/_cat/indices/auroraflow-*?format=json' > "${OBSERVABILITY_DIAGNOSTICS_DIR}/elasticsearch-indices.json" || true
            if grep -q 'auroraflow-logs' "${OBSERVABILITY_DIAGNOSTICS_DIR}/elasticsearch-indices.json"; then
              break
            fi
            echo "Waiting for Elasticsearch log indexing (${attempt}/30)"
            sleep 2
          done
          curl --fail --silent --show-error http://localhost:9200/_cluster/health > "${OBSERVABILITY_DIAGNOSTICS_DIR}/elasticsearch-health.json"
          grep -q 'auroraflow-logs' "${OBSERVABILITY_DIAGNOSTICS_DIR}/elasticsearch-indices.json"

          curl --fail --silent --show-error http://localhost:5601/api/status > "${OBSERVABILITY_DIAGNOSTICS_DIR}/kibana-status.json"
          curl --fail --silent --show-error -H 'kbn-xsrf: auroraflow' 'http://localhost:5601/api/saved_objects/_find?type=index-pattern&search_fields=title&search=auroraflow*' > "${OBSERVABILITY_DIAGNOSTICS_DIR}/kibana-data-views.json"
          grep -q 'auroraflow-logs-*' "${OBSERVABILITY_DIAGNOSTICS_DIR}/kibana-data-views.json"

      - name: Capture full-stack service logs
        if: env.SHOULD_RUN_OBSERVABILITY_FULL_STACK == 'true' && always()
        run: |
          mkdir -p "${OBSERVABILITY_DIAGNOSTICS_DIR}"
          docker compose -f docker-compose.yml -f docker-compose.observability.yml ps > "${OBSERVABILITY_DIAGNOSTICS_DIR}/compose-ps.txt" || true
          docker compose -f docker-compose.yml -f docker-compose.observability.yml logs --no-color > "${OBSERVABILITY_DIAGNOSTICS_DIR}/compose.log" || true

      - name: Stop full observability stack
        if: env.SHOULD_RUN_OBSERVABILITY_FULL_STACK == 'true' && always()
        run: docker compose -f docker-compose.yml -f docker-compose.observability.yml down --remove-orphans --volumes

      - name: Upload full-stack diagnostics
        if: env.SHOULD_RUN_OBSERVABILITY_FULL_STACK == 'true' && always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: observability-full-stack-diagnostics
          retention-days: 7
          path: |
            observability-output/full-stack/
            logs/auroraflow.ndjson

      - name: Skip full-stack smoke when not requested
        if: env.SHOULD_RUN_OBSERVABILITY_FULL_STACK != 'true'
        run: echo "Full observability stack smoke disabled; set AURORAFLOW_OBSERVABILITY_FULL_STACK_CI_ENABLED=true to run it."

  observability-remote-export:
    name: Observability Remote Export Smoke
    runs-on: ubuntu-latest
    needs: [preflight, verify]
    timeout-minutes: 8
    permissions:
      contents: read
    env:
      SHOULD_RUN_REMOTE_EXPORT: ${{ (github.ref == 'refs/heads/main' || needs.preflight.outputs.run_observability_stack == 'true') && vars.AURORAFLOW_OBSERVABILITY_REMOTE_EXPORT_ENABLED == 'true' }}
      OBSERVABILITY_DIAGNOSTICS_DIR: observability-output/remote-export
      OTEL_EXPORTER_OTLP_ENDPOINT: ${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}
      OTEL_EXPORTER_OTLP_HEADERS: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Node.js
        if: env.SHOULD_RUN_REMOTE_EXPORT == 'true' && env.OTEL_EXPORTER_OTLP_ENDPOINT != ''
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: env.SHOULD_RUN_REMOTE_EXPORT == 'true' && env.OTEL_EXPORTER_OTLP_ENDPOINT != ''
        run: npm ci

      - name: Emit remote smoke telemetry
        if: env.SHOULD_RUN_REMOTE_EXPORT == 'true' && env.OTEL_EXPORTER_OTLP_ENDPOINT != ''
        env:
          AURORAFLOW_OBSERVABILITY_DIAGNOSTICS_DIR: ${{ env.OBSERVABILITY_DIAGNOSTICS_DIR }}
          AURORAFLOW_OBSERVABILITY_ENABLED: 'true'
          AURORAFLOW_OBSERVABILITY_ENVIRONMENT: ci
          AURORAFLOW_OBSERVABILITY_STRICT: 'true'
        run: npm run observability:ci:smoke

      - name: Upload remote export diagnostics
        if: env.SHOULD_RUN_REMOTE_EXPORT == 'true' && env.OTEL_EXPORTER_OTLP_ENDPOINT != '' && always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: observability-remote-export-diagnostics
          retention-days: 7
          path: |
            observability-output/remote-export/smoke-result.json
            logs/auroraflow.ndjson

      - name: Skip remote export when not configured
        if: env.SHOULD_RUN_REMOTE_EXPORT != 'true' || env.OTEL_EXPORTER_OTLP_ENDPOINT == ''
        run: echo "Remote observability export smoke skipped because it is disabled or OTLP endpoint secret is not configured."

  smoke-e2e:
    name: Smoke E2E (Chrome)
    runs-on: ubuntu-latest
    needs: [preflight, verify]
    timeout-minutes: 8
    outputs:
      self_heal_triage_required: ${{ steps.self-heal-governance.outputs.triage_required }}
      self_heal_acknowledged: ${{ steps.self-heal-governance.outputs.acknowledged }}
      self_heal_guarded_accepted_count: ${{ steps.self-heal-governance.outputs.guarded_accepted_count }}
      self_heal_summary_markdown_path: ${{ steps.self-heal-governance.outputs.summary_markdown_path }}
    permissions:
      contents: read
      issues: write
    env:
      SHOULD_RUN_SMOKE: ${{ github.ref == 'refs/heads/main' || needs.preflight.outputs.run_smoke == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: env.SHOULD_RUN_SMOKE == 'true'
        run: npm ci

      - name: Cache Playwright browsers
        if: env.SHOULD_RUN_SMOKE == 'true'
        id: playwright-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chrome-${{ hashFiles('package-lock.json') }}

      - name: Ensure Playwright browser (Chrome) is installed
        if: env.SHOULD_RUN_SMOKE == 'true'
        run: npx playwright install chrome

      - name: Run smoke test
        if: env.SHOULD_RUN_SMOKE == 'true'
        run: npm run test:smoke

      - name: Evaluate self-healing governance
        id: self-heal-governance
        if: env.SHOULD_RUN_SMOKE == 'true' && always()
        env:
          SELF_HEAL_ARTIFACTS_DIR: test-results/self-healing
          SELF_HEAL_REQUIRE_ACK_FOR_ACCEPTED: 'true'
          SELF_HEAL_ACKNOWLEDGED: ${{ vars.SELF_HEAL_ACKNOWLEDGED }}
          SELF_HEAL_GOVERNANCE_SUMMARY_JSON: test-results/self-healing-governance-summary.json
          SELF_HEAL_GOVERNANCE_SUMMARY_MD: test-results/self-healing-governance-summary.md
        run: npm run self-heal:governance

      - name: Auto-open self-healing triage issue
        if: env.SHOULD_RUN_SMOKE == 'true' && always() && github.ref == 'refs/heads/main' && vars.SELF_HEAL_AUTO_OPEN_TRIAGE_ISSUE == 'true' && steps.self-heal-governance.outputs.triage_required == 'true' && steps.self-heal-governance.outputs.acknowledged != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SUMMARY_MARKDOWN_PATH: ${{ steps.self-heal-governance.outputs.summary_markdown_path }}
        run: |
          if [ ! -f "${SUMMARY_MARKDOWN_PATH}" ]; then
            echo "Self-healing governance summary not found at ${SUMMARY_MARKDOWN_PATH}"
            exit 1
          fi

          {
            echo ""
            echo "## CI Context"
            echo "- Workflow Run: ${RUN_URL}"
            echo "- Commit: ${GITHUB_SHA}"
          } >> "${SUMMARY_MARKDOWN_PATH}"

          gh issue create \
            --repo "${REPO}" \
            --title "Self-healing guarded acceptance review (${GITHUB_SHA::7})" \
            --body-file "${SUMMARY_MARKDOWN_PATH}"

      - name: Upload smoke artifacts
        if: env.SHOULD_RUN_SMOKE == 'true' && always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: smoke-e2e-artifacts
          retention-days: 7
          path: |
            test-results/
            test-reports/

      - name: Skip smoke lane when no relevant changes
        if: env.SHOULD_RUN_SMOKE != 'true'
        run: echo "No smoke-relevant changes detected; smoke lane completed as no-op."
