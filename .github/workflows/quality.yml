name: Quality Gates

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      run_browser_e2e: ${{ steps.paths-filter.outputs.browser_e2e }}
      run_observability: ${{ steps.paths-filter.outputs.observability }}
      run_lockfile_check: ${{ steps.paths-filter.outputs.lockfile_check }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Detect change scopes
        id: paths-filter
        if: github.event_name == 'pull_request' || github.event_name == 'push'
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          filters: |
            lockfile_check:
              - 'package.json'
              - 'package-lock.json'
              - '.github/dependabot.yml'
              - '.github/actions/setup-node-cache/action.yml'
              - 'scripts/check-lockfile-drift.mjs'
              - '.github/workflows/quality.yml'
            browser_e2e:
              - 'src/**'
              - 'tests/suites/e2e/**'
              - 'tests/fixtures/e2e-app/**'
              - 'examples/**'
              - 'configs/playwright.config.ts'
              - 'scripts/e2e-fixture-server.mjs'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/quality.yml'
              - '.github/actions/setup-node-cache/action.yml'
            observability:
              - '.github/workflows/quality.yml'
              - '.github/workflows/observability-lite.yml'
              - 'docker-compose.observability*.yml'
              - 'docs/adr/0007-durable-trend-export.md'
              - 'docs/architecture/observability-stack.md'
              - 'docs/operations/observability-contract.md'
              - 'docs/operations/observability-support-tiers.md'
              - 'docs/operations/trend-durable-export.md'
              - 'observability/**'
              - 'scripts/observability-*.ts'
              - 'src/framework/observability/**'
              - 'tests/suites/unit/framework/observability/**'
              - 'tests/suites/contracts/observability/**'
              - 'package.json'
              - 'package-lock.json'

  lockfile-drift:
    name: Lockfile Drift
    runs-on: ubuntu-latest
    needs: preflight
    # The single explicit lockfile diagnostic gate for this workflow. The shared
    # setup action no longer dry-runs the lockfile before every `npm ci`; this
    # clearer-diagnostic gate runs once when the lockfile could have moved.
    if: github.ref == 'refs/heads/main' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || needs.preflight.outputs.run_lockfile_check == 'true' || startsWith(github.head_ref, 'dependabot/')
    timeout-minutes: 3
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js for lockfile check
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'

      - name: Check package lockfile drift
        run: npm run lockfile:check

  static-analysis:
    name: Static Analysis (Node 22)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 8
    needs: preflight
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup locked Node.js dependencies
        uses: ./.github/actions/setup-node-cache
        with:
          node-version: '22'
          cache-namespace: static-analysis
          cache-version: v1

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install --yes shellcheck

      - name: Install actionlint
        run: npm run tools:actionlint

      - name: Run format check
        run: npm run format:check

      - name: Run lint
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck

      - name: Run contract tests
        run: npm run test:contracts

      - name: Run Redis/OTLP integration tests
        env:
          AURORAFLOW_REDIS_INTEGRATION_REQUIRED: 'true'
        run: npm run test:integration

      - name: Validate artifact schemas
        run: npm run schemas:check

      - name: Run shell and workflow lint
        # workflows:lint:check reuses the actionlint installed above instead of
        # reinstalling it (workflows:lint would re-bootstrap the binary).
        run: npm run shellcheck && npm run workflows:lint:check

  node-compat:
    name: Node Compatibility (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 5
    needs: preflight
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        node-version: [20, 22, 24]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup locked Node.js dependencies
        uses: ./.github/actions/setup-node-cache
        with:
          node-version: ${{ matrix.node-version }}
          cache-namespace: node-${{ matrix.node-version }}
          cache-version: v1

      - name: Run unit tests
        # Runtime-sensitive signal only. Static gates (lint/typecheck/format/schema/
        # workflow lint) run once on Node 22 in static-analysis, not per Node version.
        run: npm test

  coverage:
    name: Coverage (Unit Floors)
    runs-on: ubuntu-latest
    needs: preflight
    timeout-minutes: 8
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup locked Node.js dependencies
        uses: ./.github/actions/setup-node-cache
        with:
          node-version: '22'
          cache-namespace: coverage
          cache-version: v1

      - name: Enforce global and risk-weighted coverage thresholds
        # Single authoritative coverage-floor run over the complete unit suite.
        # Global aggregate + every risk-weighted per-file floor is enforced here;
        # the previous critical-only pass was a strict subset with identical floors.
        run: |
          set -o pipefail
          mkdir -p coverage
          npm run test:coverage 2>&1 | tee coverage/coverage-gate.log

      - name: Summarize coverage gate
        if: always()
        run: |
          {
            echo "### Coverage gate"
            echo
            echo "Command: \`npm run test:coverage\`"
            echo
            echo "One complete unit coverage run enforces the global aggregate floor and every"
            echo "risk-weighted per-file floor (configs/vitest.coverage-global.mts)."
            echo
            echo "\`\`\`text"
            if [ -f coverage/coverage-gate.log ]; then
              tail -n 120 coverage/coverage-gate.log
            else
              echo "coverage/coverage-gate.log was not created."
            fi
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"

  mutation-baseline:
    name: Mutation Baseline (Advisory)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup locked Node.js dependencies
        uses: ./.github/actions/setup-node-cache
        with:
          node-version: '22'
          cache-namespace: mutation-baseline
          cache-version: v1

      - name: Check mutation baseline
        run: |
          set -o pipefail
          mkdir -p mutation-output
          npm run test:mutation:check 2>&1 | tee mutation-output/baseline-check.txt

      - name: Upload mutation baseline evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mutation-baseline-${{ github.run_id }}
          retention-days: 14
          path: mutation-output/baseline-check.txt

  e2e-chrome:
    name: E2E (Chrome)
    runs-on: ubuntu-latest
    needs: [preflight, static-analysis, node-compat]
    timeout-minutes: 12
    # One event-aware Chrome lane. The full Chrome project (14 tests) is the union
    # of the old smoke (@smoke), guarded self-heal, examples, and risk subsets, so
    # running it once means no Playwright test ID executes twice on the same event.
    # Job-level gate: no runner is allocated for irrelevant changes.
    if: needs.preflight.outputs.run_browser_e2e == 'true' || github.ref == 'refs/heads/main' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'full-e2e')) || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'risk:e2e'))
    outputs:
      self_heal_triage_required: ${{ steps.self-heal-governance.outputs.triage_required }}
      self_heal_acknowledged: ${{ steps.self-heal-governance.outputs.acknowledged }}
      self_heal_guarded_accepted_count: ${{ steps.self-heal-governance.outputs.guarded_accepted_count }}
      self_heal_summary_markdown_path: ${{ steps.self-heal-governance.outputs.summary_markdown_path }}
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup locked Node.js dependencies and Playwright browser
        uses: ./.github/actions/setup-node-cache
        with:
          node-version: '22'
          install-browsers: 'true'
          browser-name: chrome
          cache-namespace: e2e-chrome
          cache-version: v1

      - name: Run full Chrome E2E suite
        # Full Chrome project: smoke + guarded self-heal + examples + SAT, each ID once.
        run: npm run test:e2e -- --project='Google Chrome'

      - name: Evaluate self-healing governance
        id: self-heal-governance
        if: always()
        env:
          SELF_HEAL_ARTIFACTS_DIR: test-results/self-healing
          SELF_HEAL_REQUIRE_ACK_FOR_ACCEPTED: 'true'
          SELF_HEAL_ACKNOWLEDGED: ${{ vars.SELF_HEAL_ACKNOWLEDGED }}
          SELF_HEAL_GOVERNANCE_SUMMARY_JSON: test-results/self-healing-governance-summary.json
          SELF_HEAL_GOVERNANCE_SUMMARY_MD: test-results/self-healing-governance-summary.md
        run: npm run self-heal:governance

      - name: Auto-open self-healing triage issue
        if: always() && github.ref == 'refs/heads/main' && vars.SELF_HEAL_AUTO_OPEN_TRIAGE_ISSUE == 'true' && steps.self-heal-governance.outputs.triage_required == 'true' && steps.self-heal-governance.outputs.acknowledged != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SUMMARY_MARKDOWN_PATH: ${{ steps.self-heal-governance.outputs.summary_markdown_path }}
        run: |
          if [ ! -f "${SUMMARY_MARKDOWN_PATH}" ]; then
            echo "Self-healing governance summary not found at ${SUMMARY_MARKDOWN_PATH}"
            exit 1
          fi

          {
            echo ""
            echo "## CI Context"
            echo "- Workflow Run: ${RUN_URL}"
            echo "- Commit: ${GITHUB_SHA}"
          } >> "${SUMMARY_MARKDOWN_PATH}"

          gh issue create \
            --repo "${REPO}" \
            --title "Self-healing guarded acceptance review (${GITHUB_SHA::7})" \
            --body-file "${SUMMARY_MARKDOWN_PATH}"

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-chrome-artifacts
          retention-days: 7
          path: |
            test-results/
            test-reports/

  observability-lite:
    name: Observability Lite Smoke
    needs: [preflight, static-analysis]
    # Runs only for observability-relevant changes. A scheduled daily floor and
    # manual dispatch live in the reusable observability-lite workflow itself, so
    # unrelated main pushes no longer force the collector stack.
    if: needs.preflight.outputs.run_observability == 'true'
    permissions:
      contents: read
    uses: ./.github/workflows/observability-lite.yml

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    if: always()
    needs:
      - preflight
      - lockfile-drift
      - static-analysis
      - node-compat
      - coverage
      - e2e-chrome
    permissions:
      contents: read
    timeout-minutes: 3
    steps:
      - name: Enforce upstream quality lane results
        env:
          EVENT_NAME: ${{ github.event_name }}
          IS_MAIN: ${{ github.ref == 'refs/heads/main' }}
          IS_DEPENDABOT: ${{ startsWith(github.head_ref, 'dependabot/') }}
          RUN_BROWSER_E2E: ${{ needs.preflight.outputs.run_browser_e2e }}
          RUN_LOCKFILE_CHECK: ${{ needs.preflight.outputs.run_lockfile_check }}
          HAS_FULL_E2E_LABEL: ${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'full-e2e') }}
          HAS_RISK_E2E_LABEL: ${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'risk:e2e') }}
          PREFLIGHT_RESULT: ${{ needs.preflight.result }}
          LOCKFILE_RESULT: ${{ needs.lockfile-drift.result }}
          STATIC_ANALYSIS_RESULT: ${{ needs.static-analysis.result }}
          NODE_COMPAT_RESULT: ${{ needs.node-compat.result }}
          COVERAGE_RESULT: ${{ needs.coverage.result }}
          E2E_CHROME_RESULT: ${{ needs.e2e-chrome.result }}
        run: |
          set -u
          status=0

          require_success() {
            label="$1"; result="$2"
            if [ "$result" != "success" ]; then
              echo "::error::${label} expected success but was ${result:-missing}"
              status=1
            fi
          }

          require_skipped() {
            label="$1"; result="$2"
            if [ "$result" != "skipped" ]; then
              echo "::error::${label} expected skipped for ${EVENT_NAME} but was ${result:-missing}"
              status=1
            fi
          }

          # Expected result depends on event + change scope so the gate fails closed
          # on a lane that was cancelled, errored, or unexpectedly skipped.
          lockfile_expected=skipped
          if [ "$IS_MAIN" = "true" ] || [ "$EVENT_NAME" = "schedule" ] || [ "$EVENT_NAME" = "workflow_dispatch" ] || [ "$RUN_LOCKFILE_CHECK" = "true" ] || [ "$IS_DEPENDABOT" = "true" ]; then
            lockfile_expected=success
          fi

          e2e_expected=skipped
          if [ "$IS_MAIN" = "true" ] || [ "$EVENT_NAME" = "schedule" ] || [ "$EVENT_NAME" = "workflow_dispatch" ] || [ "$RUN_BROWSER_E2E" = "true" ] || [ "$HAS_FULL_E2E_LABEL" = "true" ] || [ "$HAS_RISK_E2E_LABEL" = "true" ]; then
            e2e_expected=success
          fi

          {
            echo "### Quality Gate results"
            echo
            echo "| Lane | Expected | Actual |"
            echo "| --- | --- | --- |"
            echo "| Preflight | success | ${PREFLIGHT_RESULT:-missing} |"
            echo "| Static Analysis (Node 22) | success | ${STATIC_ANALYSIS_RESULT:-missing} |"
            echo "| Node Compatibility (20/22/24) | success | ${NODE_COMPAT_RESULT:-missing} |"
            echo "| Coverage (Unit Floors) | success | ${COVERAGE_RESULT:-missing} |"
            echo "| Lockfile Drift | ${lockfile_expected} | ${LOCKFILE_RESULT:-missing} |"
            echo "| E2E (Chrome) | ${e2e_expected} | ${E2E_CHROME_RESULT:-missing} |"
          } >> "$GITHUB_STEP_SUMMARY"

          require_success "Preflight" "$PREFLIGHT_RESULT"
          require_success "Static Analysis (Node 22)" "$STATIC_ANALYSIS_RESULT"
          require_success "Node Compatibility (20/22/24)" "$NODE_COMPAT_RESULT"
          require_success "Coverage (Unit Floors)" "$COVERAGE_RESULT"

          if [ "$lockfile_expected" = "success" ]; then
            require_success "Lockfile Drift" "$LOCKFILE_RESULT"
          else
            require_skipped "Lockfile Drift" "$LOCKFILE_RESULT"
          fi

          if [ "$e2e_expected" = "success" ]; then
            require_success "E2E (Chrome)" "$E2E_CHROME_RESULT"
          else
            require_skipped "E2E (Chrome)" "$E2E_CHROME_RESULT"
          fi

          if [ "$status" -ne 0 ]; then
            echo "Quality Gate failed closed because one or more required quality lanes had an unexpected result."
            exit "$status"
          fi

          echo "Quality Gate passed with the expected event-aware result map."
