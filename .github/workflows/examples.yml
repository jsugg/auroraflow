name: Examples

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: examples-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  preflight:
    name: Examples Preflight
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      run_examples: ${{ steps.paths-filter.outputs.examples }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Detect examples-relevant changes
        id: paths-filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            examples:
              - 'examples/**'
              - 'tests/suites/e2e/examples/**'
              - 'configs/playwright.config.ts'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/examples.yml'

  examples:
    name: Examples
    runs-on: ubuntu-latest
    needs: preflight
    timeout-minutes: 8
    permissions:
      contents: read
    env:
      SHOULD_RUN_EXAMPLES: ${{ github.ref == 'refs/heads/main' || needs.preflight.outputs.run_examples == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup locked Node.js dependencies and Playwright browser
        if: env.SHOULD_RUN_EXAMPLES == 'true'
        uses: ./.github/actions/setup-node-cache
        with:
          node-version: '22'
          install-browsers: 'true'
          browser-name: chrome
          cache-namespace: examples-chrome
          cache-version: v1

      - name: Run examples suite
        if: env.SHOULD_RUN_EXAMPLES == 'true'
        run: npm run test:examples

      - name: Upload examples artifacts
        if: env.SHOULD_RUN_EXAMPLES == 'true' && always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: examples-artifacts
          retention-days: 7
          path: |
            test-results/
            test-reports/

      - name: Skip examples lane when no relevant changes
        if: env.SHOULD_RUN_EXAMPLES != 'true'
        run: echo "No examples-relevant changes detected; examples lane completed as no-op."
