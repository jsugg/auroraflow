name: Examples

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: examples-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  preflight:
    name: Examples Preflight
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      run_examples: ${{ steps.paths-filter.outputs.examples }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Detect examples-relevant changes
        id: paths-filter
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        with:
          filters: |
            examples:
              - 'examples/**'
              - 'tests/suites/e2e/examples/**'
              - 'configs/playwright.config.ts'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/examples.yml'

  examples:
    name: Examples
    runs-on: ubuntu-latest
    needs: preflight
    timeout-minutes: 8
    permissions:
      contents: read
    env:
      SHOULD_RUN_EXAMPLES: ${{ github.ref == 'refs/heads/main' || needs.preflight.outputs.run_examples == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: env.SHOULD_RUN_EXAMPLES == 'true'
        run: npm ci

      - name: Cache Playwright browsers
        if: env.SHOULD_RUN_EXAMPLES == 'true'
        id: playwright-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chrome-${{ hashFiles('package-lock.json') }}

      - name: Ensure Playwright browser (Chrome) is installed
        if: env.SHOULD_RUN_EXAMPLES == 'true'
        run: npx playwright install chrome

      - name: Run examples suite
        if: env.SHOULD_RUN_EXAMPLES == 'true'
        run: npm run test:examples

      - name: Upload examples artifacts
        if: env.SHOULD_RUN_EXAMPLES == 'true' && always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: examples-artifacts
          retention-days: 7
          path: |
            test-results/
            test-reports/

      - name: Skip examples lane when no relevant changes
        if: env.SHOULD_RUN_EXAMPLES != 'true'
        run: echo "No examples-relevant changes detected; examples lane completed as no-op."
