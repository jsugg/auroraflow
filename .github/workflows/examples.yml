name: Examples

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: examples-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  preflight:
    name: Examples Preflight
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      run_examples: ${{ steps.paths-filter.outputs.examples }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Detect examples-relevant changes
        id: paths-filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            examples:
              - 'examples/**'
              - 'tests/suites/e2e/examples/**'
              - 'configs/playwright.config.ts'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/examples.yml'

  examples:
    name: Examples
    runs-on: ubuntu-latest
    needs: preflight
    timeout-minutes: 8
    permissions:
      contents: read
    env:
      SHOULD_RUN_EXAMPLES: ${{ github.ref == 'refs/heads/main' || needs.preflight.outputs.run_examples == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: env.SHOULD_RUN_EXAMPLES == 'true'
        run: npm ci

      - name: Cache Playwright browsers
        if: env.SHOULD_RUN_EXAMPLES == 'true'
        id: playwright-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chrome-${{ hashFiles('package-lock.json') }}

      - name: Ensure Playwright browser (Chrome) is installed
        if: env.SHOULD_RUN_EXAMPLES == 'true'
        run: npx playwright install chrome

      - name: Run examples suite
        if: env.SHOULD_RUN_EXAMPLES == 'true'
        run: npm run test:examples

      - name: Upload examples artifacts
        if: env.SHOULD_RUN_EXAMPLES == 'true' && always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: examples-artifacts
          retention-days: 7
          path: |
            test-results/
            test-reports/

      - name: Skip examples lane when no relevant changes
        if: env.SHOULD_RUN_EXAMPLES != 'true'
        run: echo "No examples-relevant changes detected; examples lane completed as no-op."
