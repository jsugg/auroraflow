name: Release Dry-Run

# Auditable release dry-run only. Publishing is intentionally
# disabled in this workflow revision per AUR-DEC-012 (npm provenance + SBOM
# baseline, signing deferred). See docs/operations/release-process.md.

on:
  workflow_dispatch:
    inputs:
      publish_confirmation:
        description: 'Leave empty for the default dry-run. Publishing is intentionally disabled; any non-empty value routes to a gated job that refuses to publish. See docs/operations/release-process.md.'
        required: false
        default: ''
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  playwright-peer-matrix:
    name: Playwright Peer Compatibility
    uses: ./.github/workflows/playwright-peer-matrix.yml

  release-dry-run:
    name: Release Dry-Run Evidence
    needs: playwright-peer-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          # Full history so the changelog draft can resolve the previous tag.
          fetch-depth: 0

      - name: Setup locked Node.js dependencies
        uses: ./.github/actions/setup-node-cache
        with:
          node-version: '22'
          cache-namespace: release
          cache-version: v1
          activate-package-manager: 'true'

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install --yes shellcheck

      - name: Install actionlint
        run: npm run tools:actionlint

      - name: Run quality gates
        env:
          AURORAFLOW_REDIS_INTEGRATION_REQUIRED: 'true'
        run: npm run verify

      - name: Validate artifact schemas
        run: |
          set -o pipefail
          mkdir -p release-evidence
          npm run schemas:check 2>&1 | tee release-evidence/schema-validation.txt

      - name: Build package
        run: npm run build

      - name: Pack package tarball
        run: |
          mkdir -p release-evidence
          npm run pack:dry-run
          npm pack --json --pack-destination release-evidence --loglevel warn > release-evidence/pack-report.json

      - name: Validate package consumer install
        run: |
          set -o pipefail
          npm run package:consumer-smoke -- --pack-report release-evidence/pack-report.json 2>&1 | tee release-evidence/consumer-smoke.txt

      - name: Run package publish validators
        run: |
          set -o pipefail
          npm run package:publint 2>&1 | tee release-evidence/publint.txt
          npm run package:attw 2>&1 | tee release-evidence/attw.txt

      - name: Generate SBOMs (runtime dependencies)
        run: |
          npm sbom --omit dev --sbom-format spdx > release-evidence/sbom.spdx.json
          npm sbom --omit dev --sbom-format cyclonedx --sbom-type library > release-evidence/sbom.cyclonedx.json

      - name: Check npm provenance readiness
        run: |
          node <<'EOF' > release-evidence/provenance-readiness.txt
          const { readFileSync } = require('node:fs');
          const pkg = JSON.parse(readFileSync('package.json', 'utf8'));
          const failures = [];
          const expectedRepo = `git+https://github.com/${process.env.GITHUB_REPOSITORY}.git`;
          if (pkg.repository?.url !== expectedRepo) {
            failures.push(`repository.url is ${pkg.repository?.url}; provenance requires ${expectedRepo}`);
          }
          if (!pkg.name || !pkg.version) {
            failures.push('package name/version missing');
          }
          if (pkg.private === true) {
            failures.push('package is marked private');
          }
          if (!Array.isArray(pkg.files) || pkg.files.length === 0) {
            failures.push('files allowlist missing; publish contents would be implicit');
          }
          console.log(`package: ${pkg.name}@${pkg.version}`);
          console.log(`repository.url: ${pkg.repository?.url}`);
          if (failures.length > 0) {
            for (const failure of failures) console.error(`FAIL: ${failure}`);
            process.exit(1);
          }
          console.log('Trusted-publishing prerequisites satisfied.');
          console.log('Note: npm trusted publishing generates provenance during a real');
          console.log('registry publish through GitHub Actions OIDC without long-lived npm tokens.');
          console.log('That publish path is deferred per AUR-DEC-012.');
          EOF
          cat release-evidence/provenance-readiness.txt

      - name: Draft changelog from Conventional Commits
        run: |
          mkdir -p release-evidence
          last_tag="$(git describe --tags --abbrev=0 2>/dev/null || true)"
          if [ -n "$last_tag" ]; then
            range="${last_tag}..HEAD"
          else
            range="HEAD"
          fi
          {
            echo "# Changelog draft"
            echo
            echo "Commit range: ${range}"
            echo
            git log --no-merges --pretty='- %s (%h)' "$range"
          } > release-evidence/changelog-draft.md

      - name: Upload release evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: release-dry-run-evidence
          retention-days: 30
          path: release-evidence/

  publish-gate:
    name: Publish Gate (disabled placeholder)
    needs: release-dry-run
    if: inputs.publish_confirmation != ''
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: read
    # Protected-environment placeholder: configure required reviewers on the
    # `release` environment before any future task enables publishing.
    environment: release
    steps:
      - name: Refuse to publish
        run: |
          echo "Publish was requested via the confirmation input, but publishing is"
          echo "intentionally disabled: this workflow ships dry-run only."
          echo "Enabling publish requires a future task that adds npm trusted"
          echo "publishing (OIDC id-token write permission, no long-lived npm tokens), required"
          echo "reviewers on the protected 'release' environment, and maintainer sign-off."
          echo "See docs/operations/release-process.md."
          exit 1
