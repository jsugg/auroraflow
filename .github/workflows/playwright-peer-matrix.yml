name: Playwright Peer Matrix

on:
  schedule:
    - cron: '0 5 * * 0'
  workflow_dispatch:
  workflow_call:

concurrency:
  group: playwright-peer-matrix-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  peer-matrix:
    name: Playwright ${{ matrix.lane }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - lane: floor
            version_spec: 1.59.1
          - lane: current
            version_spec: ''
          - lane: latest
            version_spec: ^1.59.0
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Install matrix Playwright version
        if: matrix.version_spec != ''
        env:
          PLAYWRIGHT_VERSION_SPEC: ${{ matrix.version_spec }}
        # Installing arbitrary Playwright versions outside the lockfile is this job's whole
        # purpose (cross-version peer compatibility); zizmor's adhoc-packages audit is
        # expected here and allowlisted for this file in .github/zizmor.yml.
        run: npm install --no-save --package-lock=false --ignore-scripts "playwright@${PLAYWRIGHT_VERSION_SPEC}" "playwright-core@${PLAYWRIGHT_VERSION_SPEC}" "@playwright/test@${PLAYWRIGHT_VERSION_SPEC}"

      - name: Verify installed Playwright version
        env:
          PLAYWRIGHT_LANE: ${{ matrix.lane }}
        run: |
          node <<'EOF'
          const playwrightVersion = require('playwright/package.json').version;
          const coreVersion = require('playwright-core/package.json').version;
          const testVersion = require('@playwright/test/package.json').version;
          const [major, minor] = playwrightVersion.split('.').map(Number);
          if (playwrightVersion !== testVersion || playwrightVersion !== coreVersion) {
            throw new Error(`playwright ${playwrightVersion}, playwright-core ${coreVersion}, @playwright/test ${testVersion} must match`);
          }
          if (major !== 1 || minor < 59) {
            throw new Error(`Playwright ${playwrightVersion} is outside >=1.59 <2`);
          }
          if (process.env.PLAYWRIGHT_LANE === 'floor' && playwrightVersion !== '1.59.1') {
            throw new Error(`Floor lane resolved ${playwrightVersion}, expected 1.59.1`);
          }
          console.log(`Playwright ${process.env.PLAYWRIGHT_LANE}: ${playwrightVersion}`);
          EOF

      - name: Run compatibility typecheck
        run: npm run typecheck

      - name: Run focused compatibility unit tests
        run: npm run test:unit -- --run tests/suites/unit/framework/pageFactory/pageFactory.spec.ts tests/suites/unit/framework/pageObjectBase/pageObjectBase.spec.ts

      - name: Cache Playwright Chrome
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-peer-${{ matrix.lane }}-${{ matrix.version_spec }}
          restore-keys: |
            ${{ runner.os }}-playwright-peer-${{ matrix.lane }}-

      - name: Install Playwright Chrome
        run: |
          for attempt in 1 2 3; do
            if timeout 300 npx playwright install --with-deps chrome; then
              exit 0
            fi
            echo "::warning::Playwright browser install attempt ${attempt} failed or timed out; retrying"
            sleep $((attempt * 15))
          done
          echo "::error::Playwright browser install failed after 3 attempts"
          exit 1

      - name: Run Chrome smoke suite
        run: npm run test:smoke
