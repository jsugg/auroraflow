name: E2E Matrix

# Exhaustive daily cross-browser E2E validation feeding flakiness and SLO trends.
# Post-merge Chrome coverage is provided once by the Quality Gates `E2E (Chrome)`
# lane; this workflow runs the full browser matrix on a daily schedule (and manual
# dispatch) rather than on every main push. Trigger it manually after a risky merge
# if cross-browser confirmation is needed before the next daily run.

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

concurrency:
  group: e2e-matrix-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  e2e:
    name: Full E2E (${{ matrix.lane }})
    runs-on: ubuntu-latest
    # 30 min: webkit --with-deps can pull ~114 MB from a slow apt mirror; the setup
    # action retries+resumes that download, which needs headroom beyond the tests.
    timeout-minutes: 30
    strategy:
      fail-fast: false
      max-parallel: 5
      # One job per installed browser binary (Playwright is already fully parallel
      # across a project's tests, so browser/dependency setup -- not test time --
      # dominates a job). Desktop + mobile WebKit share one webkit install in a
      # single job without losing per-project results. Two-way sharding was removed:
      # measured shard wall-clock was setup, not tests, so it only doubled setup.
      matrix:
        include:
          - lane: Google Chrome
            install_args: chrome
            slug: google-chrome
            projects: 'Google Chrome'
          - lane: Firefox
            install_args: firefox
            slug: firefox
            projects: 'Firefox'
          - lane: Microsoft Edge
            install_args: msedge
            slug: microsoft-edge
            projects: 'Microsoft Edge'
          - lane: Mobile Chrome
            install_args: chromium
            slug: mobile-chrome
            projects: 'Mobile Chrome'
          - lane: 'WebKit (Safari + Mobile Safari)'
            install_args: webkit
            slug: webkit
            projects: 'Safari;Mobile Safari'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup locked Node.js dependencies and Playwright browser
        uses: ./.github/actions/setup-node-cache
        with:
          node-version: '22'
          install-browsers: 'true'
          browser-name: ${{ matrix.install_args }}
          cache-namespace: e2e-${{ matrix.install_args }}
          cache-version: v1

      - name: Run full E2E suite
        env:
          PLAYWRIGHT_JSON_OUTPUT_FILE: test-results/playwright-results-${{ matrix.slug }}.json
          PLAYWRIGHT_PROJECTS: ${{ matrix.projects }}
        # Split the semicolon-delimited project list into safely-quoted --project
        # flags so multi-project lanes (WebKit) handle names with spaces correctly.
        run: |
          IFS=';' read -ra projects <<< "${PLAYWRIGHT_PROJECTS}"
          args=()
          for project in "${projects[@]}"; do
            args+=(--project "${project}")
          done
          npx playwright test --config=configs/playwright.config.ts "${args[@]}"

      - name: Upload E2E artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: e2e-matrix-artifacts-${{ matrix.slug }}
          retention-days: 14
          path: |
            test-results/
            test-reports/

  flakiness-report:
    name: Flakiness Report
    runs-on: ubuntu-latest
    if: always()
    needs: e2e
    timeout-minutes: 8
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup locked Node.js dependencies
        uses: ./.github/actions/setup-node-cache
        with:
          node-version: '22'
          cache-namespace: ci-reports
          cache-version: v1

      - name: Download E2E matrix artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: e2e-matrix-artifacts-*
          path: aggregated-e2e-artifacts
          merge-multiple: true

      - name: Restore flakiness trend history
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .auroraflow-trends/flakiness-trends.jsonl
          key: ${{ runner.os }}-auroraflow-flakiness-trends-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-auroraflow-flakiness-trends-${{ github.ref_name }}-

      - name: Generate flakiness summary
        run: |
          mkdir -p .auroraflow-trends
          npm run flakiness:report -- \
            --input-dir aggregated-e2e-artifacts/test-results \
            --output-json aggregated-e2e-artifacts/flakiness-summary.json \
            --output-md aggregated-e2e-artifacts/flakiness-summary.md \
            --triage-policy configs/flakiness-triage-policy.json \
            --triage-output-md aggregated-e2e-artifacts/flakiness-triage.md \
            --trend-output .auroraflow-trends/flakiness-trends.jsonl \
            --trend-limit 250
          # Keep every uploaded file under one parent directory so the artifact
          # root stays aggregated-e2e-artifacts and downstream jobs can read
          # flakiness-summary.json at the artifact root.
          cp .auroraflow-trends/flakiness-trends.jsonl aggregated-e2e-artifacts/flakiness-trends.jsonl

      - name: Upload flakiness report artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: flakiness-report
          retention-days: 14
          path: |
            aggregated-e2e-artifacts/flakiness-summary.json
            aggregated-e2e-artifacts/flakiness-summary.md
            aggregated-e2e-artifacts/flakiness-triage.md
            aggregated-e2e-artifacts/flakiness-trends.jsonl

  slo-dashboard:
    name: SLO Dashboard and Alerts
    runs-on: ubuntu-latest
    needs: flakiness-report
    if: always()
    timeout-minutes: 8
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup locked Node.js dependencies
        uses: ./.github/actions/setup-node-cache
        with:
          node-version: '22'
          cache-namespace: ci-reports
          cache-version: v1

      - name: Download flakiness report artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: flakiness-report
          path: observability-input

      - name: Restore SLO trend history
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .auroraflow-trends/slo-trends.jsonl
          key: ${{ runner.os }}-auroraflow-slo-trends-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-auroraflow-slo-trends-${{ github.ref_name }}-

      - name: Generate SLO dashboard
        run: |
          mkdir -p .auroraflow-trends
          npm run slo:dashboard -- \
            --flakiness-json observability-input/flakiness-summary.json \
            --output-json observability-output/slo-dashboard.json \
            --output-md observability-output/slo-dashboard.md \
            --trend-output .auroraflow-trends/slo-trends.jsonl \
            --trend-limit 250

      - name: Evaluate SLO alert policies
        env:
          SLO_ALERT_FAIL_ON_BREACH: ${{ vars.SLO_ALERT_FAIL_ON_BREACH }}
        run: |
          if [ "${SLO_ALERT_FAIL_ON_BREACH}" = "true" ]; then
            npm run slo:alerts -- \
              --dashboard-json observability-output/slo-dashboard.json \
              --policy-file configs/quality/slo-alert-policy.json \
              --output-json observability-output/slo-alerts.json \
              --output-md observability-output/slo-alerts.md \
              --trend-output .auroraflow-trends/slo-trends.jsonl \
              --trend-limit 250 \
              --fail-on-breach
          else
            npm run slo:alerts -- \
              --dashboard-json observability-output/slo-dashboard.json \
              --policy-file configs/quality/slo-alert-policy.json \
              --output-json observability-output/slo-alerts.json \
              --output-md observability-output/slo-alerts.md \
              --trend-output .auroraflow-trends/slo-trends.jsonl \
              --trend-limit 250
          fi

      - name: Upload SLO dashboard and alert artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: slo-dashboard-alerts
          retention-days: 14
          path: |
            observability-output/slo-dashboard.json
            observability-output/slo-dashboard.md
            observability-output/slo-alerts.json
            observability-output/slo-alerts.md
            .auroraflow-trends/slo-trends.jsonl
