name: E2E Matrix

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

concurrency:
  group: e2e-matrix-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  e2e:
    name: Full E2E (${{ matrix.project }} shard ${{ matrix.shard }})
    runs-on: ubuntu-latest
    # 30 min (was 20): webkit --with-deps can pull ~114 MB from a slow apt mirror;
    # the setup action now retries+resumes that download, which needs headroom
    # beyond the test run itself.
    timeout-minutes: 30
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        project:
          - Google Chrome
          - Firefox
          - Safari
          - Microsoft Edge
          - Mobile Chrome
          - Mobile Safari
        shard: [1, 2]
        include:
          - project: Google Chrome
            install_args: chrome
            project_slug: google-chrome
          - project: Firefox
            install_args: firefox
            project_slug: firefox
          - project: Safari
            install_args: webkit
            project_slug: safari
          - project: Microsoft Edge
            install_args: msedge
            project_slug: microsoft-edge
          - project: Mobile Chrome
            install_args: chromium
            project_slug: mobile-chrome
          - project: Mobile Safari
            install_args: webkit
            project_slug: mobile-safari
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup locked Node.js dependencies and Playwright browser
        uses: ./.github/actions/setup-node-cache
        with:
          node-version: '22'
          install-browsers: 'true'
          browser-name: ${{ matrix.install_args }}
          cache-namespace: e2e-${{ matrix.install_args }}
          cache-version: v1

      - name: Run full E2E suite
        env:
          PLAYWRIGHT_JSON_OUTPUT_FILE: test-results/playwright-results-${{ matrix.project_slug }}-shard-${{ matrix.shard }}.json
        run: npx playwright test --config=configs/playwright.config.ts --project="${{ matrix.project }}" --shard=${{ matrix.shard }}/2

      - name: Upload E2E artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: e2e-matrix-artifacts-${{ matrix.project }}-shard-${{ matrix.shard }}
          retention-days: 14
          path: |
            test-results/
            test-reports/

  flakiness-report:
    name: Flakiness Report
    runs-on: ubuntu-latest
    if: always()
    needs: e2e
    timeout-minutes: 8
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup locked Node.js dependencies
        uses: ./.github/actions/setup-node-cache
        with:
          node-version: '22'
          cache-namespace: ci-reports
          cache-version: v1

      - name: Download E2E matrix artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: e2e-matrix-artifacts-*
          path: aggregated-e2e-artifacts
          merge-multiple: true

      - name: Restore flakiness trend history
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .auroraflow-trends/flakiness-trends.jsonl
          key: ${{ runner.os }}-auroraflow-flakiness-trends-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-auroraflow-flakiness-trends-${{ github.ref_name }}-

      - name: Generate flakiness summary
        run: |
          mkdir -p .auroraflow-trends
          npm run flakiness:report -- \
            --input-dir aggregated-e2e-artifacts/test-results \
            --output-json aggregated-e2e-artifacts/flakiness-summary.json \
            --output-md aggregated-e2e-artifacts/flakiness-summary.md \
            --triage-policy configs/flakiness-triage-policy.json \
            --triage-output-md aggregated-e2e-artifacts/flakiness-triage.md \
            --trend-output .auroraflow-trends/flakiness-trends.jsonl \
            --trend-limit 250
          # Keep every uploaded file under one parent directory so the artifact
          # root stays aggregated-e2e-artifacts and downstream jobs can read
          # flakiness-summary.json at the artifact root.
          cp .auroraflow-trends/flakiness-trends.jsonl aggregated-e2e-artifacts/flakiness-trends.jsonl

      - name: Upload flakiness report artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: flakiness-report
          retention-days: 14
          path: |
            aggregated-e2e-artifacts/flakiness-summary.json
            aggregated-e2e-artifacts/flakiness-summary.md
            aggregated-e2e-artifacts/flakiness-triage.md
            aggregated-e2e-artifacts/flakiness-trends.jsonl

  slo-dashboard:
    name: SLO Dashboard and Alerts
    runs-on: ubuntu-latest
    needs: flakiness-report
    if: always()
    timeout-minutes: 8
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup locked Node.js dependencies
        uses: ./.github/actions/setup-node-cache
        with:
          node-version: '22'
          cache-namespace: ci-reports
          cache-version: v1

      - name: Download flakiness report artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: flakiness-report
          path: observability-input

      - name: Restore SLO trend history
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .auroraflow-trends/slo-trends.jsonl
          key: ${{ runner.os }}-auroraflow-slo-trends-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-auroraflow-slo-trends-${{ github.ref_name }}-

      - name: Generate SLO dashboard
        run: |
          mkdir -p .auroraflow-trends
          npm run slo:dashboard -- \
            --flakiness-json observability-input/flakiness-summary.json \
            --output-json observability-output/slo-dashboard.json \
            --output-md observability-output/slo-dashboard.md \
            --trend-output .auroraflow-trends/slo-trends.jsonl \
            --trend-limit 250

      - name: Evaluate SLO alert policies
        env:
          SLO_ALERT_FAIL_ON_BREACH: ${{ vars.SLO_ALERT_FAIL_ON_BREACH }}
        run: |
          if [ "${SLO_ALERT_FAIL_ON_BREACH}" = "true" ]; then
            npm run slo:alerts -- \
              --dashboard-json observability-output/slo-dashboard.json \
              --policy-file configs/quality/slo-alert-policy.json \
              --output-json observability-output/slo-alerts.json \
              --output-md observability-output/slo-alerts.md \
              --trend-output .auroraflow-trends/slo-trends.jsonl \
              --trend-limit 250 \
              --fail-on-breach
          else
            npm run slo:alerts -- \
              --dashboard-json observability-output/slo-dashboard.json \
              --policy-file configs/quality/slo-alert-policy.json \
              --output-json observability-output/slo-alerts.json \
              --output-md observability-output/slo-alerts.md \
              --trend-output .auroraflow-trends/slo-trends.jsonl \
              --trend-limit 250
          fi

      - name: Upload SLO dashboard and alert artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: slo-dashboard-alerts
          retention-days: 14
          path: |
            observability-output/slo-dashboard.json
            observability-output/slo-dashboard.md
            observability-output/slo-alerts.json
            observability-output/slo-alerts.md
            .auroraflow-trends/slo-trends.jsonl
