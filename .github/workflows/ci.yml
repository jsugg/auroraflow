name: E2E Matrix

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

concurrency:
  group: e2e-matrix-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  e2e:
    name: Full E2E (${{ matrix.project }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        include:
          - project: Google Chrome
            install_args: chrome
          - project: Firefox
            install_args: firefox
          - project: Safari
            install_args: webkit
          - project: Microsoft Edge
            install_args: msedge
          - project: Mobile Chrome
            install_args: chromium
          - project: Mobile Safari
            install_args: webkit
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ matrix.install_args }}-${{ hashFiles('package-lock.json') }}

      - name: Ensure required Playwright browser is installed
        run: npx playwright install --with-deps ${{ matrix.install_args }}

      - name: Run full E2E suite
        run: npx playwright test --config=configs/playwright.config.ts --project="${{ matrix.project }}"

      - name: Upload E2E artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: e2e-matrix-artifacts-${{ matrix.project }}
          retention-days: 14
          path: |
            test-results/
            test-reports/
