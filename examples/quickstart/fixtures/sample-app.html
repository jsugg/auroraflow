<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AuroraFlow Quickstart Fixture</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        margin: 2rem;
        line-height: 1.4;
      }

      .container {
        max-width: 640px;
      }

      label,
      input,
      button {
        display: block;
        margin-bottom: 0.75rem;
      }

      #status {
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <h1>Quickstart App</h1>
      <p>Use this fixture to validate deterministic local E2E examples.</p>

      <form id="greeting-form">
        <label for="name-input">Name</label>
        <input id="name-input" name="name" type="text" />
        <button type="submit">Submit</button>
      </form>

      <p id="status" aria-live="polite">Waiting for input...</p>
    </main>

    <script>
      const form = document.getElementById('greeting-form');
      const status = document.getElementById('status');
      const input = document.getElementById('name-input');

      form.addEventListener('submit', (event) => {
        event.preventDefault();
        const value = input.value.trim();
        status.textContent = value ? `Hello, ${value}!` : 'Please enter a name.';
      });
    </script>
  </body>
</html>
