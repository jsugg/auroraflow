global:
  scrape_interval: 15s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: otel-collector
    scheme: https
    metrics_path: /metrics
    static_configs:
      - targets:
          - otel-collector:9464
    tls_config:
      ca_file: /run/secrets/auroraflow-observability/tls/ca.crt
      cert_file: /run/secrets/auroraflow-observability/tls/prometheus.crt
      key_file: /run/secrets/auroraflow-observability/tls/prometheus.key
