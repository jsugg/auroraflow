[server]
protocol = https
cert_file = /run/secrets/auroraflow-observability/tls/grafana.crt
cert_key = /run/secrets/auroraflow-observability/tls/grafana.key

[auth.anonymous]
enabled = false

[security]
cookie_secure = true
strict_transport_security = true
disable_gravatar = true

[users]
allow_sign_up = false
