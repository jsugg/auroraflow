input {
  file {
    path => "/auroraflow/logs/*.ndjson"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    mode => "tail"
    codec => "json_lines"
    tags => ["auroraflow-log"]
  }

  file {
    path => "/auroraflow/test-results/self-healing/*.json"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    mode => "read"
    codec => "json"
    tags => ["auroraflow-self-healing"]
  }
}

filter {
  mutate {
    gsub => [
      "message", "(?i)(password|token|secret|api[_-]?key)=([^\\s]+)", "\\1=[REDACTED]"
    ]
  }

  if ![timestamp] {
    mutate {
      add_field => {
        "timestamp" => "%{@timestamp}"
      }
    }
  }
}

output {
  if "auroraflow-self-healing" in [tags] {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "auroraflow-self-healing-%{+YYYY.MM.dd}"
    }
  } else {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "auroraflow-logs-%{+YYYY.MM.dd}"
    }
  }

  stdout {
    codec => json_lines
  }
}
