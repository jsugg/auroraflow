input {
  http {
    port => 8080
    codec => "json"
    tags => ["auroraflow-log"]
  }

  file {
    path => "/auroraflow/logs/*.ndjson"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    mode => "tail"
    codec => "json_lines"
    tags => ["auroraflow-log"]
  }

  file {
    path => "/auroraflow/test-results/self-healing/*.json"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    mode => "read"
    codec => "json"
    tags => ["auroraflow-self-healing"]
  }
}

filter {
  mutate {
    add_field => {
      "auroraflow.ingest_schema_version" => "1"
    }
  }

  if "_jsonparsefailure" in [tags] {
    mutate {
      add_tag => ["auroraflow-ingestion-dead-letter"]
      add_field => {
        "auroraflow.ingest_error" => "json_parse_failure"
        "auroraflow.source_kind" => "log"
      }
    }
  } else if "auroraflow-self-healing" in [tags] {
    mutate {
      add_field => {
        "auroraflow.source_kind" => "self_healing"
      }
    }
  } else {
    mutate {
      add_field => {
        "auroraflow.source_kind" => "log"
      }
    }
  }

  ruby {
    code => '
      secret_key_pattern = /(password|passwd|token|secret|api[_-]?key|authorization|cookie|session)/i
      secret_value_pattern = /(password|passwd|token|secret|api[_-]?key|authorization|cookie|session)(\s*[=:]\s*)([^\s,;"]+)/i
      redact_value = nil
      redact_value = lambda do |value|
        case value
        when Hash
          value.each_with_object({}) do |(key, nested_value), redacted|
            key_text = key.to_s
            redacted[key] = secret_key_pattern.match?(key_text) ? "[REDACTED]" : redact_value.call(nested_value)
          end
        when Array
          value.map { |entry| redact_value.call(entry) }
        when String
          value.gsub(secret_value_pattern) { "#{$1}#{$2}[REDACTED]" }
        else
          value
        end
      end

      event.to_hash.each do |key, value|
        next if key.start_with?("@")
        event.set(key, secret_key_pattern.match?(key) ? "[REDACTED]" : redact_value.call(value))
      end
    '
  }

  mutate {
    gsub => [
      "message", "(?i)(password|token|secret|api[_-]?key)=([^\\s]+)", "\\1=[REDACTED]"
    ]
  }

  if ![timestamp] {
    mutate {
      add_field => {
        "timestamp" => "%{@timestamp}"
      }
    }
  }
}

output {
  if "auroraflow-ingestion-dead-letter" in [tags] {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "auroraflow-ingest-dead-letter-%{+YYYY.MM.dd}"
    }
  } else if "auroraflow-self-healing" in [tags] {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "auroraflow-self-healing-%{+YYYY.MM.dd}"
    }
  } else {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "auroraflow-logs-%{+YYYY.MM.dd}"
    }
  }

  stdout {
    codec => json_lines
  }
}
